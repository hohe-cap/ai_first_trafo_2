# =============================================================================
# CRAFT Deep-Dive: Adoption & Usage (Dimension A)
# =============================================================================
# Extended exploration for the A dimension. Same quality criteria as Pulse Check.
# See METHODOLOGY.md for design principles and scoring rules.
#
# Version: 2.0
# Last Updated: 2026-02-12
# Total Questions: 10 (2 Context + 4 Maturity + 2 MC-Diagnostik + 1 Powerful Question + 1 context-MC)
# Estimated Duration: 15-20 minutes
# =============================================================================

version: "2.0"
exploration_type: "deep_dive_adoption"
dimension: "A"
dimension_name:
  de: "Adoption & Usage"
  en: "Adoption & Usage"

description:
  de: >-
    Vertiefende Analyse der AI-Adoptions-Dynamik.
    Bricht die Dimension A in 4 Sub-Topics auf: Nutzungsbreite,
    Nutzungstiefe, Output-Qualitaet/Vertrauen und Wissensteilung.
  en: >-
    In-depth analysis of AI adoption dynamics.
    Breaks dimension A into 4 sub-topics: usage breadth,
    usage depth, output quality/trust, and knowledge sharing.

estimated_duration_minutes: 20
frequency: "once_at_kickoff_then_on_demand"
trigger:
  condition: "Kickoff baseline OR A-Score stagnation in Pulse Check"
respondent: "All team members (individual, anonymous)"

# =============================================================================
# SUB-TOPICS
# =============================================================================
sub_topics:
  - key: "usage_regularity"
    name:
      de: "Nutzungsbreite & Regelmaessigkeit"
      en: "Usage Breadth & Regularity"
    description:
      de: "Wie regelmaessig und breit wird AI über verschiedene Arbeitsbereiche genutzt?"
      en: "How regularly and broadly is AI used across different work areas?"
    order: 1

  - key: "usage_depth"
    name:
      de: "Nutzungstiefe (Usage Mode)"
      en: "Usage Depth (Usage Mode)"
    description:
      de: "Wie tief ist AI integriert — von Chat bis agentisch?"
      en: "How deeply is AI integrated — from chat to agentic?"
    order: 2

  - key: "output_trust"
    name:
      de: "Output-Qualität & Vertrauen"
      en: "Output Quality & Trust"
    description:
      de: "Ist der AI-Output nützlich und wird ihm vertraut?"
      en: "Is AI output useful and trusted?"
    order: 3

  - key: "knowledge_sharing"
    name:
      de: "Wissensteilung & Best Practices"
      en: "Knowledge Sharing & Best Practices"
    description:
      de: "Werden Erfahrungen, Prompts und Best Practices systematisch geteilt?"
      en: "Are experiences, prompts, and best practices shared systematically?"
    order: 4

# =============================================================================
# QUESTIONS
# =============================================================================
questions:

  # ---------------------------------------------------------------------------
  # CONTEXT / METRIC QUESTIONS
  # ---------------------------------------------------------------------------
  - question_key: "A-CTX-1"
    question_type: "context"
    sub_topic: ~
    question_text:
      de: "In welchen SDLC-Phasen nutzt du AI heute? (Mehrfachauswahl)"
      en: "In which SDLC phases do you use AI today? (Multiple selection)"
    why_important:
      de: "SDLC-Abdeckung zeigt Adoptionsbreite. Nur-Coding ist suboptimal — AI kann in allen Phasen Wert schaffen."
      en: "SDLC coverage shows adoption breadth. Coding-only is suboptimal — AI can create value in all phases."
    answer_type: "multiple_choice"
    allow_multiple: true
    answer_options:
      - key: "requirements"
        de: "Requirements / User Stories"
        en: "Requirements / User Stories"
        order: 1
      - key: "design"
        de: "Design / Architektur"
        en: "Design / Architecture"
        order: 2
      - key: "coding"
        de: "Coding / Implementierung"
        en: "Coding / Implementation"
        order: 3
      - key: "code_review"
        de: "Code Review"
        en: "Code Review"
        order: 4
      - key: "testing"
        de: "Testing / QA"
        en: "Testing / QA"
        order: 5
      - key: "documentation"
        de: "Dokumentation"
        en: "Documentation"
        order: 6
      - key: "ops"
        de: "Operations / Monitoring"
        en: "Operations / Monitoring"
        order: 7
      - key: "incident"
        de: "Incident Response"
        en: "Incident Response"
        order: 8
      - key: "none"
        de: "Keine"
        en: "None"
        order: 9
    scoring_note: "Context only — maps SDLC coverage, does not feed into spider score"
    order: 1

  - question_key: "A-CTX-2"
    question_type: "context"
    sub_topic: ~
    question_text:
      de: "Wie viel Zeit investierst du durchschnittlich PRO TAG in AI-gestützte Arbeit?"
      en: "How much time do you invest on average PER DAY in AI-supported work?"
    why_important:
      de: "Zeigt Nutzungsintensität. Unter 30 Min/Tag deutet auf oberflächliche Nutzung hin."
      en: "Shows usage intensity. Under 30 min/day indicates superficial usage."
    answer_type: "single_choice"
    answer_options:
      - key: "none"
        de: "Gar nicht"
        en: "Not at all"
        order: 1
      - key: "under_30min"
        de: "Unter 30 Minuten"
        en: "Under 30 minutes"
        order: 2
      - key: "30min_to_1h"
        de: "30 Min - 1 Stunde"
        en: "30 min - 1 hour"
        order: 3
      - key: "1_to_2h"
        de: "1-2 Stunden"
        en: "1-2 hours"
        order: 4
      - key: "over_2h"
        de: "Über 2 Stunden"
        en: "Over 2 hours"
        order: 5
    scoring_note: "Context only — usage intensity indicator"
    order: 2

  # ---------------------------------------------------------------------------
  # MATURITY QUESTIONS
  # ---------------------------------------------------------------------------
  - question_key: "A-M-REGULARITY"
    question_type: "maturity"
    sub_topic: "usage_regularity"
    question_text:
      de: "Welche Stufe beschreibt deine tatsächliche AI-Nutzung am besten?"
      en: "Which level best describes your actual AI usage?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich nutze keine AI-Tools für meine Arbeit."
        en: "I don't use any AI tools for my work."
      2:
        label: "Experimenting"
        de: "Ich nutze AI gelegentlich für einfache Aufgaben (z.B. Textformulierung, Quick Qüstions), nicht regelmaessig."
        en: "I use AI occasionally for simple tasks (e.g., text drafting, quick questions), not regularly."
      3:
        label: "Embedding"
        de: "Ich nutze AI regelmaessig (mind. wöchentlich) in 1-2 Arbeitsbereichen und es spart mir merklich Zeit."
        en: "I use AI regularly (at least weekly) in 1-2 work areas and it noticeably saves me time."
      4:
        label: "Scaling"
        de: "AI ist fester Bestandteil meiner täglichen Arbeit in mehreren Bereichen und SDLC-Phasen."
        en: "AI is an integral part of my daily work across multiple areas and SDLC phases."
      5:
        label: "Evolving"
        de: "AI ist durchgängig in meinen Workflow integriert; ich optimiere aktiv Prompts/Workflows und teile Best Practices."
        en: "AI is fully integrated into my workflow; I actively optimize prompts/workflows and share best practices."
    order: 3

  - question_key: "A-M-DEPTH"
    question_type: "maturity"
    sub_topic: "usage_depth"
    question_text:
      de: "Welche Stufe beschreibt deinen typischen AI-Nutzungsmodus am besten?"
      en: "Which level best describes your typical AI usage mode?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich nutze AI gar nicht."
        en: "I don't use AI at all."
      2:
        label: "Experimenting"
        de: "Nur Chat-basiert (Q&A, Copy-Paste); AI ist ein separates Fenster, nicht in meine Tools integriert."
        en: "Chat-based only (Q&A, copy-paste); AI is a separate window, not integrated into my tools."
      3:
        label: "Embedding"
        de: "AI ist in meiner IDE oder meinem Workflow integriert; ich nutze es Schritt-für-Schritt für bestimmte Aufgaben."
        en: "AI is integrated in my IDE or workflow; I use it step-by-step for specific tasks."
      4:
        label: "Scaling"
        de: "Agentische Nutzung — AI übernimmt teilautonome Aufgaben (z.B. Coding-Tasks, Test-Generierung), ich reviewe die Ergebnisse."
        en: "Agentic usage — AI handles semi-autonomous tasks (e.g., coding tasks, test generation), I review the results."
      5:
        label: "Evolving"
        de: "Multi-agentische Workflows; AI bearbeitet End-to-End-Aufgaben; ich orchestriere mehr als ich ausführe."
        en: "Multi-agentic workflows; AI handles end-to-end tasks; I orchestrate rather than execute."
    order: 4

  - question_key: "A-M-QUALITY"
    question_type: "maturity"
    sub_topic: "output_trust"
    question_text:
      de: "Welche Stufe beschreibt deine Erfahrung mit der Qualität von AI-Outputs am besten?"
      en: "Which level best describes your experience with AI output quality?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich habe keine Erfahrung mit AI-Outputs, um die Qualität beurteilen zu können."
        en: "I have no experience with AI outputs to judge quality."
      2:
        label: "Experimenting"
        de: "AI-Output ist Glückssache; ich vertraue ihm oft nicht und mache die Arbeit am Ende doch selbst."
        en: "AI output is hit-or-miss; I often don't trust it and end up doing the work myself."
      3:
        label: "Embedding"
        de: "AI liefert einen brauchbaren Startpunkt, der bearbeitet werden muss; ich kann meistens erkennen, wenn der Output falsch ist."
        en: "AI provides a usable starting point that needs editing; I can usually tell when output is wrong."
      4:
        label: "Scaling"
        de: "AI-Output ist zuverlässig gut für meine Use Cases; ich habe gelernt, effektiv zu prompten; Review-Aufwand ist gering."
        en: "AI output is reliably good for my use cases; I've learned to prompt effectively; review effort is low."
      5:
        label: "Evolving"
        de: "AI-Output ist hochwertig; ich habe eigene Prompts/Workflows gebaut, die konstant gute Ergebnisse liefern; ich lehre andere, gute Ergebnisse zu erzielen."
        en: "AI output is high quality; I've built custom prompts/workflows that consistently deliver; I teach others to get good results."
    order: 5

  - question_key: "A-M-SHARING"
    question_type: "maturity"
    sub_topic: "knowledge_sharing"
    question_text:
      de: "Welche Stufe beschreibt den Austausch von AI-Wissen und Best Practices in eurem Team am besten?"
      en: "Which level best describes AI knowledge and best practice sharing in your team?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Niemand teilt AI-Tipps oder Erfahrungen; jeder findet alles selbst heraus."
        en: "Nobody shares AI tips or experiences; everyone figures things out alone."
      2:
        label: "Experimenting"
        de: "Informeller Austausch passiert (Chat, Kaffee), aber nichts Strukturiertes."
        en: "Informal sharing happens (chat, coffee) but nothing structured."
      3:
        label: "Embedding"
        de: "Es gibt eine geteilte Prompt-Sammlung oder Wiki; gelegentliche Show-and-Tell-Sessions finden statt."
        en: "There's a shared prompt collection or wiki; occasional show & tell sessions take place."
      4:
        label: "Scaling"
        de: "Aktive Best-Practice-Kultur; Prompt Library wird gepflegt; regelmaessige Community-Sessions; Erfolgsgeschichten werden dokumentiert."
        en: "Active best practice culture; prompt library maintained; regular community sessions; success stories documented."
      5:
        label: "Evolving"
        de: "Systematisches Wissensmanagement; Prompts/Workflows versioniert und in Tools integriert; kontinuierliche Verbesserungskultur."
        en: "Systematic knowledge management; prompts/workflows versioned and integrated in tools; continuous improvement culture."
    order: 6

  # ---------------------------------------------------------------------------
  # MC DIAGNOSTICS
  # ---------------------------------------------------------------------------
  - question_key: "A-MC-BLOCKER"
    question_type: "diagnostic"
    question_text:
      de: "Was ist der Hauptgrund, warum AI-Nutzung in deinem Team nicht weiter wächst?"
      en: "What is the main reason AI usage in your team isn't growing further?"
    answer_type: "single_choice"
    answer_options:
      - key: "tool_quality"
        de: "Tool-Qualität / Zuverlässigkeit unzureichend"
        en: "Tool quality / reliability insufficient"
        order: 1
      - key: "skill_gap"
        de: "Team weiss nicht WIE man AI effektiv nutzt"
        en: "Team doesn't know HOW to use AI effectively"
        order: 2
      - key: "unclear_value"
        de: "Nutzen nicht klar / keine überzeugenden Use Cases"
        en: "Value unclear / no convincing use cases"
        order: 3
      - key: "process_friction"
        de: "AI passt nicht in bestehende Workflows"
        en: "AI doesn't fit into existing workflows"
        order: 4
      - key: "time_pressure"
        de: "Keine Zeit zum Lernen und Experimentieren"
        en: "No time to learn and experiment"
        order: 5
      - key: "governance"
        de: "Governance / Compliance blockiert"
        en: "Governance / compliance blocks"
        order: 6
      - key: "no_blocker"
        de: "Kein Blocker — Adoption wächst stetig"
        en: "No blocker — adoption growing steadily"
        order: 7
    order: 7

  - question_key: "A-MC-SDLC-GAP"
    question_type: "diagnostic"
    question_text:
      de: "In welchen SDLC-Phasen SOLLTE AI genutzt werden, wird es aber noch nicht? (Mehrfachauswahl)"
      en: "In which SDLC phases SHOULD AI be used, but isn't yet? (Multiple selection)"
    answer_type: "multiple_choice"
    allow_multiple: true
    answer_options:
      - key: "requirements"
        de: "Requirements / User Stories"
        en: "Requirements / User Stories"
        order: 1
      - key: "design"
        de: "Design / Architektur"
        en: "Design / Architecture"
        order: 2
      - key: "coding"
        de: "Coding / Implementierung"
        en: "Coding / Implementation"
        order: 3
      - key: "testing"
        de: "Testing / QA"
        en: "Testing / QA"
        order: 4
      - key: "code_review"
        de: "Code Review"
        en: "Code Review"
        order: 5
      - key: "documentation"
        de: "Dokumentation"
        en: "Documentation"
        order: 6
      - key: "ops"
        de: "Operations / Monitoring"
        en: "Operations / Monitoring"
        order: 7
      - key: "all_covered"
        de: "Alle Phasen werden abgedeckt"
        en: "All phases are covered"
        order: 8
    order: 8

  # ---------------------------------------------------------------------------
  # POWERFUL QUESTION
  # ---------------------------------------------------------------------------
  - question_key: "A-PQ"
    question_type: "powerful_question"
    optional: true
    question_text:
      de: "Beschreibe einen konkreten Moment, in dem AI dir wirklich geholfen hat — oder dich frustriert hat."
      en: "Describe a concrete moment when AI truly helped you — or frustrated you."
    max_length: 280
    moderation_note:
      de: "Nur als Themen-Cluster veröffentlichen, nie als Rohtext. k-Anonymität beachten."
      en: "Only publish as topic clusters, never as raw text. Observe k-anonymity."
    order: 9

# =============================================================================
# SCORING
# =============================================================================
scoring:
  formula: "(median(A-M-REGULARITY, A-M-DEPTH, A-M-QUALITY, A-M-SHARING) * 0.6) + (min(A-M-REGULARITY, A-M-DEPTH, A-M-QUALITY, A-M-SHARING) * 0.4)"
  scale: "1-5"
  interpretation:
    1:
      label: "Exploring"
      de: "Keine AI-Nutzung; kein Wissen über Möglichkeiten; keine Sharing-Kultur."
      en: "No AI usage; no knowledge of possibilities; no sharing culture."
    2:
      label: "Experimenting"
      de: "Gelegentliche Nutzung; Chat-basiert; Output unsicher; informeller Austausch."
      en: "Occasional usage; chat-based; uncertain output; informal sharing."
    3:
      label: "Embedding"
      de: "Regelmaessige Nutzung in 1-2 Bereichen; IDE-integriert; brauchbare Outputs; erste Sharing-Strukturen."
      en: "Regular usage in 1-2 areas; IDE-integrated; usable outputs; first sharing structures."
    4:
      label: "Scaling"
      de: "Tägliche Nutzung, mehrere SDLC-Phasen; agentisch; zuverlässige Outputs; aktive Best-Practice-Kultur."
      en: "Daily usage, multiple SDLC phases; agentic; reliable outputs; active best practice culture."
    5:
      label: "Evolving"
      de: "Durchgängig integriert; multi-agentisch; hochwertige Outputs; systematisches Wissensmanagement."
      en: "Fully integrated; multi-agentic; high-quality outputs; systematic knowledge management."

pulse_check_relationship:
  pulse_check_question: "A-M1"
  sub_topic_mapping:
    A-M1_level_1: "Maps to: usage_regularity at Exploring, no usage"
    A-M1_level_2: "Maps to: usage_regularity at Experimenting, chat-only depth"
    A-M1_level_3: "Maps to: usage_regularity at Embedding, integrated depth, first time savings"
    A-M1_level_4: "Maps to: most sub-topics at Scaling, daily multi-area usage"
    A-M1_level_5: "Maps to: all sub-topics at Evolving, optimizing and sharing"
