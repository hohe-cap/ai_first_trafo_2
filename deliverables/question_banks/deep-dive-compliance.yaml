# Deep Dive Assessment: Compliance & Governance (Dimension C)
# Triggered when C-Score < 2 in quarterly Pulse Check
# Focus: Diagnose WHY compliance is blocking AI adoption
# Duration: ~15 minutes

version: "1.0"
assessment_type: "deep_dive_compliance"
description:
  de: "Vertiefende Analyse der Compliance- und Governance-Barrieren. Wird ausgelöst wenn der C-Score unter 2 liegt. Ziel: Identifizieren ob fehlende Policies, langsame Prozesse, unklare Verantwortlichkeiten oder kultureller Widerstand gegen Governance die Hauptblockade darstellen."
  en: "In-depth analysis of compliance and governance barriers. Triggered when C-Score is below 2. Goal: Identify whether missing policies, slow processes, unclear ownership, or cultural resistance to governance are the main blockers."
estimated_duration_minutes: 15
trigger:
  dimension: "C"
  condition: "score < 2 in pulse check"
respondent: "AI Transformation Manager or Governance Liaison"

questions:
  - question_key: "dd_c_01"
    question_text:
      de: "Welches ist aktuell der GRÖSSTE Compliance-Blocker für AI-Adoption in Ihrem Team?"
      en: "What is currently the BIGGEST compliance blocker for AI adoption in your team?"
    why_important:
      de: "Identifiziert die Haupt-Barriere um gezielte Maßnahmen zu priorisieren."
      en: "Identifies the main barrier to prioritize targeted actions."
    answer_type: "single_choice"
    answer_options:
      - key: "missing_policies"
        de: "Fehlende oder unklare AI-Nutzungs-Policies"
        en: "Missing or unclear AI usage policies"
        score: 20
        order: 1
      - key: "slow_approval"
        de: "Zu langsame Genehmigungs- und Freigabeprozesse"
        en: "Too slow approval and release processes"
        score: 40
        order: 2
      - key: "unclear_ownership"
        de: "Unklare Verantwortlichkeiten (wer darf was entscheiden?)"
        en: "Unclear responsibilities (who can decide what?)"
        score: 30
        order: 3
      - key: "betriebsrat"
        de: "Betriebsrat-Abstimmung noch nicht erfolgt oder blockiert"
        en: "Works council alignment not yet done or blocked"
        score: 10
        order: 4
      - key: "data_classification"
        de: "Unklare Datenklassifizierung (was darf wohin?)"
        en: "Unclear data classification (what can go where?)"
        score: 25
        order: 5
      - key: "no_blocker"
        de: "Kein signifikanter Blocker vorhanden"
        en: "No significant blocker present"
        score: 100
        order: 6
    weight: 1.5
    order: 1

  - question_key: "dd_c_02"
    question_text:
      de: "Wie lange dauert aktuell die Freigabe eines neuen AI-Tools (von Anfrage bis produktiver Nutzung)?"
      en: "How long does approval of a new AI tool currently take (from request to productive use)?"
    why_important:
      de: "Time-to-approval ist ein kritischer KPI für Governance-Effizienz. Wartezeiten >4 Wochen blockieren Innovation."
      en: "Time-to-approval is a critical KPI for governance efficiency. Wait times >4 weeks block innovation."
    answer_type: "single_choice"
    answer_options:
      - key: "under_1_week"
        de: "Unter 1 Woche"
        en: "Under 1 week"
        score: 100
        order: 1
      - key: "1_to_2_weeks"
        de: "1-2 Wochen"
        en: "1-2 weeks"
        score: 80
        order: 2
      - key: "2_to_4_weeks"
        de: "2-4 Wochen"
        en: "2-4 weeks"
        score: 50
        order: 3
      - key: "4_to_8_weeks"
        de: "4-8 Wochen"
        en: "4-8 weeks"
        score: 20
        order: 4
      - key: "over_8_weeks"
        de: "Über 8 Wochen oder keine Freigabe erfolgt"
        en: "Over 8 weeks or no approval granted"
        score: 0
        order: 5
      - key: "never_requested"
        de: "Noch nie beantragt / nicht bekannt"
        en: "Never requested / not known"
        score: 10
        order: 6
    weight: 1.3
    order: 2

  - question_key: "dd_c_03"
    question_text:
      de: "Gibt es eine schriftliche AI-Nutzungs-Policy die für Entwickler zugänglich und verständlich ist?"
      en: "Is there a written AI usage policy that is accessible and understandable for developers?"
    why_important:
      de: "Ohne klare Policy agieren Teams im Graubereich oder gar nicht. Eine Policy muss existieren, kommuniziert sein und verstanden werden."
      en: "Without clear policy, teams operate in gray areas or not at all. A policy must exist, be communicated, and be understood."
    answer_type: "single_choice"
    answer_options:
      - key: "comprehensive_clear"
        de: "Ja, umfassend und klar formuliert, Team kennt sie"
        en: "Yes, comprehensive and clearly formulated, team knows it"
        score: 100
        order: 1
      - key: "exists_unclear"
        de: "Ja, existiert, aber schwer verständlich oder zu allgemein"
        en: "Yes, exists but hard to understand or too general"
        score: 60
        order: 2
      - key: "draft_only"
        de: "Nur als Draft vorhanden, noch nicht offiziell"
        en: "Only available as draft, not yet official"
        score: 40
        order: 3
      - key: "no_policy"
        de: "Nein, keine Policy vorhanden"
        en: "No, no policy available"
        score: 0
        order: 4
      - key: "unknown"
        de: "Weiß nicht / nicht bekannt im Team"
        en: "Don't know / not known in team"
        score: 10
        order: 5
    weight: 1.4
    order: 3

  - question_key: "dd_c_04"
    question_text:
      de: "Wurde die Nutzung von AI-Coding-Tools (z.B. GitHub Copilot, Claude, ChatGPT) mit dem Betriebsrat abgestimmt?"
      en: "Has the use of AI coding tools (e.g., GitHub Copilot, Claude, ChatGPT) been aligned with the works council?"
    why_important:
      de: "Betriebsrat-Abstimmung ist in Deutschland gesetzlich erforderlich bei Überwachungs-Potential. Fehlende Abstimmung ist ein rechtliches Risiko."
      en: "Works council alignment is legally required in Germany when monitoring potential exists. Missing alignment is a legal risk."
    answer_type: "single_choice"
    answer_options:
      - key: "formally_approved"
        de: "Ja, formell abgestimmt und genehmigt (Betriebsvereinbarung)"
        en: "Yes, formally aligned and approved (works agreement)"
        score: 100
        order: 1
      - key: "in_progress"
        de: "Abstimmung läuft, konstruktiver Dialog"
        en: "Alignment in progress, constructive dialogue"
        score: 60
        order: 2
      - key: "stalled"
        de: "Abstimmung läuft, aber stockt oder Widerstand"
        en: "Alignment in progress but stalled or resistance"
        score: 30
        order: 3
      - key: "not_started"
        de: "Noch nicht gestartet"
        en: "Not yet started"
        score: 10
        order: 4
      - key: "not_applicable"
        de: "Nicht erforderlich (kein Betriebsrat / andere Jurisdiktion)"
        en: "Not applicable (no works council / other jurisdiction)"
        score: 100
        order: 5
    weight: 1.2
    order: 4

  - question_key: "dd_c_05"
    question_text:
      de: "Wie gut verstehen Entwickler welche Daten sie in welche AI-Tools eingeben dürfen (Datenklassifizierung)?"
      en: "How well do developers understand which data they may input into which AI tools (data classification)?"
    why_important:
      de: "Unklare Datenklassifizierung führt zu Angst oder Verstößen. Klarheit ist Voraussetzung für sichere Nutzung."
      en: "Unclear data classification leads to fear or violations. Clarity is prerequisite for safe usage."
    answer_type: "single_choice"
    answer_options:
      - key: "very_clear"
        de: "Sehr klar - klare Regeln, einfache Entscheidungshilfen (z.B. Ampel-System)"
        en: "Very clear - clear rules, simple decision aids (e.g., traffic light system)"
        score: 100
        order: 1
      - key: "mostly_clear"
        de: "Überwiegend klar - einige Grauzonen, aber Ansprechpartner verfügbar"
        en: "Mostly clear - some gray areas, but contact persons available"
        score: 70
        order: 2
      - key: "unclear"
        de: "Unklar - viel Unsicherheit, keine klaren Guidelines"
        en: "Unclear - much uncertainty, no clear guidelines"
        score: 30
        order: 3
      - key: "very_unclear"
        de: "Sehr unklar - im Zweifel wird gar nichts genutzt"
        en: "Very unclear - when in doubt, nothing is used"
        score: 0
        order: 4
    weight: 1.3
    order: 5

  - question_key: "dd_c_06"
    question_text:
      de: "Welche der drei Sicherheitsstufen sind in Ihrer Organisation VERFÜGBAR? (Mehrfachauswahl möglich)"
      en: "Which of the three security tiers are AVAILABLE in your organization? (Multiple selection possible)"
    why_important:
      de: "Multi-Tier-Strategie ist entscheidend: Public Cloud für unkritische Daten, Private Cloud für sensible, Air-gapped für streng vertraulich."
      en: "Multi-tier strategy is crucial: Public cloud for non-critical data, private cloud for sensitive, air-gapped for strictly confidential."
    answer_type: "multiple_choice"
    allow_multiple: true
    answer_options:
      - key: "tier1_public"
        de: "Stufe 1: Public Cloud (GitHub Copilot, Claude Pro, ChatGPT Enterprise)"
        en: "Tier 1: Public Cloud (GitHub Copilot, Claude Pro, ChatGPT Enterprise)"
        score: 30
        order: 1
      - key: "tier2_private"
        de: "Stufe 2: Private Cloud (Azure OpenAI, AWS Bedrock im eigenen Tenant)"
        en: "Tier 2: Private Cloud (Azure OpenAI, AWS Bedrock in own tenant)"
        score: 40
        order: 2
      - key: "tier3_airgapped"
        de: "Stufe 3: Air-gapped (Ollama/vLLM lokal, Continue.dev)"
        en: "Tier 3: Air-gapped (Ollama/vLLM local, Continue.dev)"
        score: 30
        order: 3
      - key: "none"
        de: "Keine Stufe verfügbar"
        en: "No tier available"
        score: 0
        order: 4
    weight: 1.4
    order: 6

  - question_key: "dd_c_07"
    question_text:
      de: "Wer ist die VERANTWORTLICHE Person/Rolle für AI-Governance-Entscheidungen in Ihrer Organisation?"
      en: "Who is the RESPONSIBLE person/role for AI governance decisions in your organization?"
    why_important:
      de: "Ohne klaren Owner verzögern sich Entscheidungen oder fallen gar nicht. Ownership ist kritisch für Geschwindigkeit."
      en: "Without clear owner, decisions are delayed or never made. Ownership is critical for speed."
    answer_type: "single_choice"
    answer_options:
      - key: "dedicated_role"
        de: "Dedizierte Rolle (z.B. AI Governance Lead, CISO mit AI-Fokus)"
        en: "Dedicated role (e.g., AI Governance Lead, CISO with AI focus)"
        score: 100
        order: 1
      - key: "shared_clear"
        de: "Geteilte Verantwortung, aber klar definiert (z.B. CISO + Legal)"
        en: "Shared responsibility, but clearly defined (e.g., CISO + Legal)"
        score: 80
        order: 2
      - key: "shared_unclear"
        de: "Geteilte Verantwortung, aber Grenzen unklar"
        en: "Shared responsibility, but boundaries unclear"
        score: 40
        order: 3
      - key: "no_owner"
        de: "Keine klare Verantwortlichkeit definiert"
        en: "No clear responsibility defined"
        score: 0
        order: 4
    weight: 1.3
    order: 7

  - question_key: "dd_c_08"
    question_text:
      de: "Gibt es einen Eskalationsweg wenn ein Team auf einen Governance-Blocker trifft?"
      en: "Is there an escalation path when a team encounters a governance blocker?"
    why_important:
      de: "Ohne Eskalationsweg bleiben Blocker bestehen. Ein funktionierender Fast-Track ist entscheidend für Agilität."
      en: "Without escalation path, blockers persist. A functioning fast-track is crucial for agility."
    answer_type: "single_choice"
    answer_options:
      - key: "fast_track"
        de: "Ja, definierter Fast-Track mit SLA (z.B. 48h Reaktionszeit)"
        en: "Yes, defined fast-track with SLA (e.g., 48h response time)"
        score: 100
        order: 1
      - key: "informal"
        de: "Ja, informell über bekannte Ansprechpartner"
        en: "Yes, informally via known contact persons"
        score: 70
        order: 2
      - key: "unclear"
        de: "Unklar oder zu langwierig"
        en: "Unclear or too lengthy"
        score: 30
        order: 3
      - key: "no_path"
        de: "Nein, kein Eskalationsweg bekannt"
        en: "No, no escalation path known"
        score: 0
        order: 4
    weight: 1.2
    order: 8

  - question_key: "dd_c_09"
    question_text:
      de: "Wie hoch schätzen Sie das Risiko ein dass Shadow AI (ungenehmigt genutzte Tools) ein Compliance-Problem darstellt?"
      en: "How high do you estimate the risk that Shadow AI (unapproved tools used) poses a compliance problem?"
    why_important:
      de: "Shadow AI ist ein Indikator für fehlende offizielle Alternativen oder zu restriktive Policies. Hohe Shadow AI = Governance-Failure."
      en: "Shadow AI is an indicator of missing official alternatives or too restrictive policies. High Shadow AI = governance failure."
    answer_type: "single_choice"
    answer_options:
      - key: "low_managed"
        de: "Niedrig - wir haben Amnestie angeboten und kanalisieren Shadow AI"
        en: "Low - we offered amnesty and channel Shadow AI"
        score: 100
        order: 1
      - key: "medium_aware"
        de: "Mittel - wir wissen davon, arbeiten an offiziellen Alternativen"
        en: "Medium - we know about it, working on official alternatives"
        score: 60
        order: 2
      - key: "high_unmanaged"
        de: "Hoch - weitverbreitet, aber nicht adressiert"
        en: "High - widespread but not addressed"
        score: 20
        order: 3
      - key: "unknown"
        de: "Unbekannt - wir haben keinen Überblick"
        en: "Unknown - we have no overview"
        score: 10
        order: 4
    weight: 1.1
    order: 9

  - question_key: "dd_c_10"
    question_text:
      de: "Wie ist Ihre Organisation auf den EU AI Act vorbereitet (Inkrafttreten 2026)?"
      en: "How is your organization prepared for the EU AI Act (effective 2026)?"
    why_important:
      de: "EU AI Act wird verbindlich. Unvorbereitet sein bedeutet Compliance-Risiko und potenzielle Bußgelder."
      en: "EU AI Act will be binding. Being unprepared means compliance risk and potential fines."
    answer_type: "single_choice"
    answer_options:
      - key: "well_prepared"
        de: "Gut vorbereitet - Gap-Analyse gemacht, Roadmap definiert"
        en: "Well prepared - gap analysis done, roadmap defined"
        score: 100
        order: 1
      - key: "awareness"
        de: "Bewusstsein vorhanden, erste Schritte geplant"
        en: "Awareness present, first steps planned"
        score: 60
        order: 2
      - key: "minimal"
        de: "Minimal - bekannt, aber noch nicht adressiert"
        en: "Minimal - known but not yet addressed"
        score: 30
        order: 3
      - key: "unaware"
        de: "Nicht bekannt / nicht adressiert"
        en: "Not known / not addressed"
        score: 0
        order: 4
    weight: 1.0
    order: 10

scoring:
  dimension: "C"
  formula: "weighted_average"
  interpretation:
    de: |
      C-Score Interpretation:
      - 0-30: Kritisch - fundamentale Governance-Lücken, hohes Compliance-Risiko
      - 31-50: Schwach - wichtige Policies fehlen oder Prozesse zu langsam
      - 51-70: Entwicklung - Grundlagen vorhanden, aber Optimierungsbedarf
      - 71-85: Gut - funktionierende Governance, moderate Geschwindigkeit
      - 86-100: Exzellent - agile Governance, klare Verantwortlichkeiten, schnelle Freigaben
    en: |
      C-Score Interpretation:
      - 0-30: Critical - fundamental governance gaps, high compliance risk
      - 31-50: Weak - important policies missing or processes too slow
      - 51-70: Developing - basics present but optimization needed
      - 71-85: Good - functioning governance, moderate speed
      - 86-100: Excellent - agile governance, clear responsibilities, fast approvals
