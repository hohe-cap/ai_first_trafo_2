  # ---------------------------------------------------------------------------
  # BO — Business Outcome (übergreifend, dimensionsunabhängig)
  # ---------------------------------------------------------------------------
  - question_key: "BO-M1"
    dimension: "cross_cutting"
    question_type: "outcome"
    question_text:
      de: >-
        In welchem Maß hat sich das bei Transformationsstart identifizierte Business-Problem
        aus eurer Sicht verbessert? (Das Problem wird vom AI Transformation Manager
        vor der ersten Durchführung eingesetzt, z.B. 'zu langsame Delivery' oder 'hohe Fehlerrate')
      en: >-
        To what extent has the business problem identified at transformation start
        improved from your perspective? (The problem is inserted by the AI Transformation
        Manager before the first run, e.g. 'too slow delivery' or 'high defect rate')
    description:
      de: >-
        Übergreifende Frage, nicht einer CRAFT-Dimension zugeordnet.
        Schliesst den Kreis: Löst die Transformation das eigentliche Problem?
        Ergebnis fliesst in Business Problem Check (Iterations-Review Woche 4)
        und Sponsor-Reporting ein.
      en: >-
        Cross-cutting question, not assigned to a CRAFT dimension.
        Closes the loop: Is the transformation solving the actual problem?
        Result feeds into Business Problem Check (iteration review week 4)
        and sponsor reporting.
    answer_type: "single_choice"
    answer_options:
      - key: "worse"
        de: "Verschlechtert"
        en: "Worse"
        score: 1
        order: 1
      - key: "unchanged"
        de: "Unverändert"
        en: "Unchanged"
        score: 2
        order: 2
      - key: "slightly_improved"
        de: "Leicht verbessert"
        en: "Slightly improved"
        score: 3
        order: 3
      - key: "clearly_improved"
        de: "Deutlich verbessert"
        en: "Clearly improved"
        score: 4
        order: 4
      - key: "solved"
        de: "Gelöst / kein Problem mehr"
        en: "Solved / no longer a problem"
        score: 5
        order: 5
    customization_note:
      de: >-
        Der AI Transformation Manager ersetzt den Platzhalter in der Fragestellung
        durch das konkrete Business-Problem aus dem Business Impact Discovery.
        Beispiel: 'In welchem Maß hat sich euer Lead-Time-Problem verbessert?'
      en: >-
        The AI Transformation Manager replaces the placeholder in the question
        with the concrete business problem from the Business Impact Discovery.
        Example: 'To what extent has your lead time problem improved?'
    skip_if: "first_pulse_check"
    skip_reason:
      de: "Beim ersten Pulse Check noch kein Vergleichspunkt vorhanden."
      en: "No comparison point available at first pulse check."
    order: 17

# =============================================================================
# SCORING
# =============================================================================
scoring:
  spider_score:
    description:
      de: >-
        Pro Dimension: Median der Maturity-Antworten (X-M1) ueber alle Respondenten = Score 1-5.
        Da der Pulse Check nur 1 Maturity-Frage pro Dimension hat, ist der Score
        direkt der Median (keine Min-Gewichtung noetig — die Min-gewichtete Formel
        gilt nur fuer Deep-Dives mit mehreren Sub-Topics).
      en: >-
        Per dimension: Median of maturity answers (X-M1) across all respondents = Score 1-5.
        Since the pulse check has only 1 maturity question per dimension, the score
        is directly the median (no min-weighting needed — the min-weighted formula
        only applies to deep-dives with multiple sub-topics).
    method: "median"
    scale: "1-5"
    segmentation: "Optional nach Team, Rolle, Arbeitskontext (nur bei k >= 5)"

  deep_dive_correlation:
    description:
      de: >-
        Der Pulse Check Score pro Dimension sollte mit dem Deep-Dive Score
        korrelieren. Grosse Abweichungen deuten auf Antwort-Verzerrung hin
        und sollten im HITL-Review diskutiert werden.
      en: >-
        The pulse check score per dimension should correlate with the
        deep-dive score. Large deviations indicate response bias and
        should be discussed in the HITL review.

  trend:
    description:
      de: "Zyklusvergleich: Spider-Overlay + Delta-Tabelle (alle 4 Wochen)"
      en: "Cycle comparison: Spider overlay + delta table (every 4 weeks)"

  hitl_review:
    description:
      de: >-
        AI erstellt Spider-Diagramm, Delta-Analyse, Top-3 Blocker/Treiber,
        5-10 Interventionsvorschlaege. Menschen entscheiden in 60-90 Min Review.
      en: >-
        AI creates spider diagram, delta analysis, top-3 blockers/drivers,
        5-10 intervention suggestions. Humans decide in 60-90 min review.

# =============================================================================
# ANTI-PATTERNS
# =============================================================================
anti_patterns:
  de:
    - "Pulse Check als Performance-Ranking von Individuen nutzen"
    - "Segment-Drilldown unter k-Schwelle"
    - "Zu viele Fragen — strikt bei <=15 Minuten bleiben"
    - "Freitext ohne klare Moderation (Deanonymisierung durch Details)"
    - "Maturity-Stufen als Bewertung statt Steuerungsinstrument"
    - "Spider-Scores ohne MC-Diagnostik interpretieren (Zahl ohne Kontext)"
    - "Pulse Check Score ohne Deep-Dive-Baseline interpretieren (kein Sub-Topic-Kontext)"
  en:
    - "Using pulse check as individual performance ranking"
    - "Segment drilldown below k threshold"
    - "Too many questions — strictly stay at <=15 minutes"
    - "Free text without clear moderation (deanonymization through details)"
    - "Using maturity levels as evaluation instead of steering instrument"
    - "Interpreting spider scores without MC diagnostics (number without context)"
    - "Interpreting pulse check score without deep-dive baseline (no sub-topic context)"
