  # ---------------------------------------------------------------------------
  # T — Technical Enablement
  # ---------------------------------------------------------------------------
  - question_key: "T-M1"
    dimension: "T"
    question_type: "maturity"
    deep_dive_sub_topics: ["tool_availability", "ide_integration", "reliability", "ecosystem"]
    question_text:
      de: "Welche Stufe beschreibt euer aktuelles AI-Tooling am besten?"
      en: "Which level best describes your current AI tooling?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich habe keinen Zugang zu freigegebenen AI-Tools."
        en: "I have no access to approved AI tools."
      2:
        label: "Experimenting"
        de: "Ich habe Zugang, aber nur als separaten Chat (nicht in IDE/Workflow integriert); Zugang einzurichten war umständlich."
        en: "I have access, but only as separate chat (not integrated in IDE/workflow); setting up access was cumbersome."
      3:
        label: "Embedding"
        de: "AI ist in mein Hauptwerkzeug integriert (z.B. IDE), aber Verfügbarkeit oder Performance schwankt; Prompts/Playbooks fehlen."
        en: "AI is integrated in my main tool (e.g. IDE), but availability or performance fluctuates; prompts/playbooks missing."
      4:
        label: "Scaling"
        de: "AI-Tools sind zuverlässig, performant und in IDE/CI integriert; wiederverwendbare Prompts/Playbooks sind verfügbar."
        en: "AI tools are reliable, performant and integrated in IDE/CI; reusable prompts/playbooks are available."
      5:
        label: "Evolving"
        de: "AI-Tooling ist vollständig integriert (IDE, CI/CD, Monitoring), Self-Service-Provisioning, automatisierte Guardrails, Kosten-Transparenz."
        en: "AI tooling is fully integrated (IDE, CI/CD, monitoring), self-service provisioning, automated guardrails, cost transparency."
    order: 14

