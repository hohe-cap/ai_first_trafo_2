# =============================================================================
# CRAFT Pulse Check (Ebene 2) — Cycle Exploration (every 4-week cycle)
# =============================================================================
# Pulse check at the start of every 4-week PDCA cycle (<=15 minutes).
# Generates Spider Chart (1-5) per CRAFT dimension.
# Anonymous, segmentable, context-adaptive.
#
# The Pulse Check is an EXTRACT of the Deep-Dive explorations:
# - Each Maturity question here (X-M1) is the high-level summary of
#   3-5 sub-topic maturity questions in the corresponding deep-dive-*.yaml
# - Deep-Dives provide the granular WHY; Pulse Check tracks the TREND
#
# Design Methodology: See METHODOLOGY.md for full scoring rules, calibration,
# and visualization principles.
#
# Source of Truth: This YAML file.
# Derived view: pulse-check-question-bank-v1.md
#
# Version: 2.0
# Last Updated: 2026-02-12
# Total Questions: 16 (5 Maturity + 8 MC + 1 Powerful Question + 2 segmentation-adjacent)
# Estimated Duration: <=15 minutes
# =============================================================================

version: "2.0"
exploration_type: "pulse_check"
description:
  de: >-
    Pulse Check zu Beginn jedes 4-Wochen-Zyklus. Anonym, segmentierbar, <=15 Minuten.
    Erzeugt Spider-Score (1-5) pro CRAFT-Dimension.
    Ist ein Extrakt der Deep-Dive Explorationen (Ebene 3).
    Auffälligkeiten im Pulse Check triggern bei Bedarf einen Deep-Dive.
  en: >-
    Pulse check at the start of each 4-week cycle. Anonymous, segmentable, <=15 minutes.
    Generates spider score (1-5) per CRAFT dimension.
    Is an extract of the Deep-Dive explorations (Level 3).
    Anomalies in the pulse check trigger a deep-dive on demand.
estimated_duration_minutes: 15
frequency: "every_cycle"
respondent: "All team members (individual, anonymous)"
context_dependency: "Filtered by Ebene 1 Context & Readiness Exploration results"
methodology_reference: "METHODOLOGY.md"

# =============================================================================
# DESIGN RULES
# =============================================================================
design_rules:
  de:
    - "Pro Dimension: 1 Maturity-Frage (Spider-Score) + 1-2 MC (Diagnostik) + 0-1 Powerful Question"
    - "Keine Likert-Skalen. Maturity-Stufen mit konkreten Verhaltensbeschreibungen."
    - "Alle Maturity-Stufen tragen Labels: Exploring → Experimenting → Embedding → Scaling → Evolving"
    - "Segmentfelder sind nicht-identifizierend, Auswertung nur bei k >= 5"
    - "Keine personenbezogenen Daten (Name, E-Mail, Mitarbeiter-ID)"
    - "Context-adaptive Filterung basierend auf Ebene 1 Exploration"
    - "Jede Maturity-Frage ist die High-Level-Zusammenfassung des entsprechenden Deep-Dives"
  en:
    - "Per dimension: 1 maturity question (spider score) + 1-2 MC (diagnostics) + 0-1 powerful question"
    - "No Likert scales. Maturity levels with concrete behavioral descriptions."
    - "All maturity levels carry labels: Exploring → Experimenting → Embedding → Scaling → Evolving"
    - "Segment fields are non-identifying, evaluation only when k >= 5"
    - "No personal data (name, email, employee ID)"
    - "Context-adaptive filtering based on Ebene 1 exploration"
    - "Each maturity question is the high-level summary of the corresponding deep-dive"

# =============================================================================
# SEGMENTATION FIELDS
# =============================================================================
segmentation:
  required:
    - key: "team_cluster"
      name:
        de: "Team-/Cluster-Code"
        en: "Team/Cluster Code"
      description:
        de: "Vordefinierte Auswahl, nicht frei getippt"
        en: "Predefined selection, not free-typed"
      type: "predefined_list"

    - key: "role_family"
      name:
        de: "Rollen-Familie"
        en: "Role Family"
      type: "single_choice"
      options:
        - key: "dev"
          de: "Dev"
          en: "Dev"
        - key: "qa_test"
          de: "QA / Test"
          en: "QA / Test"
        - key: "po_ba"
          de: "PO / BA"
          en: "PO / BA"
        - key: "ops_sre"
          de: "Ops / SRE"
          en: "Ops / SRE"
        - key: "security_compliance"
          de: "Security / Compliance"
          en: "Security / Compliance"
        - key: "management_lead"
          de: "Management / Lead"
          en: "Management / Lead"
        - key: "other"
          de: "Andere"
          en: "Other"

    - key: "work_context"
      name:
        de: "Arbeitskontext"
        en: "Work Context"
      type: "single_choice"
      options:
        - key: "product_team"
          de: "Produktteam"
          en: "Product Team"
        - key: "platform_team"
          de: "Plattformteam"
          en: "Platform Team"
        - key: "shared_service"
          de: "Shared Service"
          en: "Shared Service"
        - key: "project_program"
          de: "Projekt / Programm"
          en: "Project / Program"

  optional:
    - key: "seniority"
      name:
        de: "Seniority"
        en: "Seniority"
      type: "single_choice"
      show_if: "k >= 5 in parent segment"
      options:
        - key: "junior"
          de: "Junior"
          en: "Junior"
        - key: "mid"
          de: "Mid"
          en: "Mid"
        - key: "senior"
          de: "Senior"
          en: "Senior"
        - key: "lead_principal"
          de: "Lead / Principal"
          en: "Lead / Principal"

  k_anonymity:
    minimum_k: 5
    rules:
      de:
        - "Segment-Ergebnisse nur anzeigen wenn k >= 5 Antworten"
        - "Keine Kreuztabellen die zu kleinen Gruppen fuehren"
        - "Freitext nur als Themen-Cluster veroeffentlichen, nie als Rohtext"
      en:
        - "Show segment results only when k >= 5 responses"
        - "No cross-tabs that lead to small groups"
        - "Free text only as topic clusters, never raw text"

# =============================================================================
# DIMENSIONS
# =============================================================================
dimensions:
  - key: "C"
    name:
      de: "Compliance & Governance"
      en: "Compliance & Governance"
    deep_dive: "deep-dive-compliance.yaml"
    order: 1
  - key: "R"
    name:
      de: "Readiness (Human & Cultural)"
      en: "Readiness (Human & Cultural)"
    deep_dive: "deep-dive-readiness.yaml"
    order: 2
  - key: "A"
    name:
      de: "Adoption & Usage"
      en: "Adoption & Usage"
    deep_dive: "deep-dive-adoption.yaml"
    order: 3
  - key: "F"
    name:
      de: "Flow & Process Integration"
      en: "Flow & Process Integration"
    deep_dive: "deep-dive-flow.yaml"
    order: 4
  - key: "T"
    name:
      de: "Technical Enablement"
      en: "Technical Enablement"
    deep_dive: "deep-dive-technical.yaml"
    order: 5

# =============================================================================
# QUESTIONS
# =============================================================================
questions:

  # ---------------------------------------------------------------------------
  # C — Compliance & Governance
  # ---------------------------------------------------------------------------
  - question_key: "C-M1"
    dimension: "C"
    question_type: "maturity"
    deep_dive_sub_topics: ["policy_clarity", "governance_speed", "data_classification", "regulatory_readiness"]
    question_text:
      de: "Welche Stufe beschreibt eure aktuelle Compliance/Governance-Situation am besten?"
      en: "Which level best describes your current compliance/governance situation?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich weiss nicht, welche AI-Tools ich nutzen darf; es gibt keine klare Policy."
        en: "I don't know which AI tools I'm allowed to use; there's no clear policy."
      2:
        label: "Experimenting"
        de: "Ich kenne die Regeln grob, aber bei Unsicherheit weiss ich nicht, wen ich fragen soll oder warte sehr lange auf Antwort."
        en: "I roughly know the rules, but when unsure I don't know who to ask or wait very long for answers."
      3:
        label: "Embedding"
        de: "Policies existieren und sind bekannt; Freigaben/Antworten kommen, aber dauern oft zu lang oder sind nicht praxisnah."
        en: "Policies exist and are known; approvals/answers come but often take too long or aren't practical."
      4:
        label: "Scaling"
        de: "Policies sind klar und praxisnah; bei Unsicherheit bekomme ich schnell eine verlässliche Antwort."
        en: "Policies are clear and practical; when unsure I quickly get a reliable answer."
      5:
        label: "Evolving"
        de: "Compliance ist in meinen Workflow integriert (automatisierte Checks, Self-Service-Freigaben, klare Entscheidungsbäume)."
        en: "Compliance is integrated into my workflow (automated checks, self-service approvals, clear decision trees)."
    order: 1

  - question_key: "C-MC1"
    dimension: "C"
    question_type: "diagnostic"
    challenge_ref: ["C-H1", "C-H2", "C-H3", "C-H4"]
    question_text:
      de: "Welche Situation blockiert euch am häufigsten?"
      en: "Which situation blocks you most frequently?"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "data_classification"
        de: "Unklare Datenklassifizierung"
        en: "Unclear data classification"
        order: 1
      - key: "tool_not_approved"
        de: "Tool nicht freigegeben"
        en: "Tool not approved"
        order: 2
      - key: "privacy_unclear"
        de: "Betriebsrat / Privacy unklar"
        en: "Works council / Privacy unclear"
        order: 3
      - key: "security_slow"
        de: "Security-Prozess zu langsam"
        en: "Security process too slow"
        order: 4
      - key: "cost_quota"
        de: "Kosten / Quota"
        en: "Cost / Quota"
        order: 5
      - key: "nothing"
        de: "Nichts blockiert aktuell"
        en: "Nothing currently blocking"
        order: 6
      - key: "other"
        de: "Anderes"
        en: "Other"
        order: 7
    order: 2

  - question_key: "C-PQ1"
    dimension: "C"
    question_type: "powerful_question"
    optional: true
    question_text:
      de: "Welche 1 Governance-Regel würde sich morgen ändern, wenn du entscheiden duerftest?"
      en: "Which 1 governance rule would change tomorrow if you could decide?"
    max_length: 280
    moderation_note:
      de: "Nur als Themen-Cluster veröffentlichen, nie als Rohtext. k-Anonymität beachten."
      en: "Only publish as topic clusters, never as raw text. Observe k-anonymity."
    order: 3

  # ---------------------------------------------------------------------------
  # R — Readiness (Human & Cultural)
  # ---------------------------------------------------------------------------
  - question_key: "R-M1"
    dimension: "R"
    question_type: "maturity"
    deep_dive_sub_topics: ["psychological_safety", "skill_confidence", "role_evolution", "peer_support"]
    question_text:
      de: "Welche Stufe beschreibt deine persönliche AI-Readiness am besten?"
      en: "Which level best describes your personal AI readiness?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich habe kein Verständnis dafür, was AI für meine Arbeit bedeutet; es gibt keine Enablement-Angebote."
        en: "I have no understanding of what AI means for my work; there are no enablement offerings."
      2:
        label: "Experimenting"
        de: "Ich habe ein grobes Verständnis, fühle mich aber unsicher in der Anwendung; ich weiss nicht, wo ich anfangen soll."
        en: "I have a rough understanding but feel insecure in application; I don't know where to start."
      3:
        label: "Embedding"
        de: "Ich kann AI-Tools grundlegend bedienen und im Team offen darüber sprechen, bin aber unsicher bei Qualitätsbewertung (Halluzinationen, Grenzen)."
        en: "I can basically use AI tools and discuss them openly in the team, but I'm unsure about quality assessment (hallucinations, limitations)."
      4:
        label: "Scaling"
        de: "Ich kann AI-Outputs kritisch bewerten und sinnvoll in meinen Alltag einbauen; ich verstehe, wie sich meine Rolle verändert."
        en: "I can critically evaluate AI outputs and meaningfully integrate them into my daily work; I understand how my role is changing."
      5:
        label: "Evolving"
        de: "Ich bin sicher im Umgang mit AI, unterstütze andere aktiv (Champion-Rolle), und gestalte Veränderungen in meiner Rolle proaktiv."
        en: "I'm confident with AI, actively support others (champion role), and proactively shape changes in my role."
    order: 4

  - question_key: "R-MC1"
    dimension: "R"
    question_type: "diagnostic"
    question_text:
      de: "Was wäre für dich der stärkste Enablement-Hebel?"
      en: "What would be the strongest enablement lever for you?"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "playbooks"
        de: "Kurze Beispiele / Playbooks"
        en: "Short examples / Playbooks"
        order: 1
      - key: "pairing"
        de: "Pairing mit erfahrenen Kolleg:innen"
        en: "Pairing with experienced colleagues"
        order: 2
      - key: "training"
        de: "Strukturiertes Training"
        en: "Structured training"
        order: 3
      - key: "prompts"
        de: "Bessere Prompts / Templates"
        en: "Better prompts / templates"
        order: 4
      - key: "time"
        de: "Mehr Zeit zum Experimentieren"
        en: "More time to experiment"
        order: 5
      - key: "champion"
        de: "Champion-Support im Team"
        en: "Champion support in team"
        order: 6
    order: 5

  - question_key: "R-MC2"
    dimension: "R"
    question_type: "diagnostic"
    challenge_ref: ["R-H1", "R-H2", "R-H4", "R-H5", "R-H6"]
    normalization_note:
      de: "Viele Menschen erleben diese Hemmnisse — das ist ein normaler Teil der Transformation. Deine Antwort hilft uns, gezielt die richtigen Unterstützungsangebote zu schaffen."
      en: "Many people experience these inhibitors — this is a normal part of transformation. Your answer helps us create the right support offerings."
    question_text:
      de: "Was hemmt dich aktuell am meisten?"
      en: "What inhibits you most currently?"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "quality_uncertainty"
        de: "Unsicherheit über Qualität der Outputs"
        en: "Uncertainty about output quality"
        order: 1
      - key: "unclear_use_cases"
        de: "Unklar, wofür AI sinnvoll ist"
        en: "Unclear what AI is useful for"
        order: 2
      - key: "no_time"
        de: "Fehlende Zeit"
        en: "Lack of time"
        order: 3
      - key: "no_training"
        de: "Fehlendes Training"
        en: "Lack of training"
        order: 4
      - key: "role_concern"
        de: "Sorge um Rolle / Arbeitsplatz"
        en: "Concern about role / job"
        order: 5
      - key: "tech_barriers"
        de: "Technische Hürden"
        en: "Technical barriers"
        order: 6
      - key: "nothing"
        de: "Nichts hemmt mich"
        en: "Nothing inhibits me"
        order: 7
    order: 6

  # ---------------------------------------------------------------------------
  # A — Adoption & Usage
  # ---------------------------------------------------------------------------
  - question_key: "A-M1"
    dimension: "A"
    question_type: "maturity"
    deep_dive_sub_topics: ["usage_regularity", "usage_depth", "output_trust", "knowledge_sharing"]
    question_text:
      de: "Welche Stufe beschreibt deine tatsächliche AI-Nutzung am besten?"
      en: "Which level best describes your actual AI usage?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich nutze keine AI-Tools für meine Arbeit."
        en: "I don't use any AI tools for my work."
      2:
        label: "Experimenting"
        de: "Ich nutze AI gelegentlich für einfache Aufgaben (z.B. Textformulierung, Quick Qüstions), nicht regelmaessig."
        en: "I use AI occasionally for simple tasks (e.g. text drafting, quick questions), not regularly."
      3:
        label: "Embedding"
        de: "Ich nutze AI regelmaessig (mind. wöchentlich) in 1-2 Arbeitsbereichen und es spart mir merklich Zeit."
        en: "I use AI regularly (at least weekly) in 1-2 work areas and it noticeably saves me time."
      4:
        label: "Scaling"
        de: "AI ist fester Bestandteil meiner täglichen Arbeit in mehreren Bereichen/SDLC-Phasen."
        en: "AI is an integral part of my daily work across multiple areas/SDLC phases."
      5:
        label: "Evolving"
        de: "AI ist durchgängig in meinen Workflow integriert; ich optimiere aktiv Prompts/Workflows und teile Best Practices."
        en: "AI is fully integrated into my workflow; I actively optimize prompts/workflows and share best practices."
    order: 7

  - question_key: "A-MC1"
    dimension: "A"
    question_type: "diagnostic"
    question_text:
      de: "Welcher Nutzungsmodus beschreibt deine typische GenAI-Nutzung am besten?"
      en: "Which usage mode best describes your typical GenAI usage?"
    description:
      de: "Usage Mode Tracking (1-5 Skala)"
      en: "Usage mode tracking (1-5 scale)"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "none"
        de: "1: Gar nicht"
        en: "1: Not at all"
        usage_mode: 1
        order: 1
      - key: "chat"
        de: "2: Chat-basiert (Q&A / Copy-Paste), nicht integriert"
        en: "2: Chat-based (Q&A / copy-paste), not integrated"
        usage_mode: 2
        order: 2
      - key: "integrated"
        de: "3: Integriert (IDE/Workflow), Schritt-für-Schritt gesteuert"
        en: "3: Integrated (IDE/workflow), step-by-step controlled"
        usage_mode: 3
        order: 3
      - key: "agentic"
        de: "4: Agentisch (teilautonom), mit Review/Gates"
        en: "4: Agentic (semi-autonomous), with review/gates"
        usage_mode: 4
        order: 4
      - key: "multi_agentic"
        de: "5: Multi-agentisch (mehrere Agenten), end-to-end Aufgaben"
        en: "5: Multi-agentic (multiple agents), end-to-end tasks"
        usage_mode: 5
        order: 5
    order: 8

  - question_key: "A-MC2"
    dimension: "A"
    question_type: "diagnostic"
    question_text:
      de: "In welchen SDLC-Phasen nutzt du AI heute?"
      en: "In which SDLC phases do you use AI today?"
    answer_type: "multiple_choice"
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "requirements"
        de: "Requirements"
        en: "Requirements"
        order: 1
      - key: "design"
        de: "Design"
        en: "Design"
        order: 2
      - key: "coding"
        de: "Coding"
        en: "Coding"
        order: 3
      - key: "code_review"
        de: "Code Review"
        en: "Code Review"
        order: 4
      - key: "testing"
        de: "Testing"
        en: "Testing"
        order: 5
      - key: "docs"
        de: "Dokumentation"
        en: "Documentation"
        order: 6
      - key: "ops"
        de: "Operations"
        en: "Operations"
        order: 7
      - key: "incident"
        de: "Incident Response"
        en: "Incident Response"
        order: 8
      - key: "security"
        de: "Security"
        en: "Security"
        order: 9
      - key: "none"
        de: "Keine"
        en: "None"
        order: 10
    order: 9

  - question_key: "A-MC3"
    dimension: "A"
    question_type: "diagnostic"
    challenge_ref: ["A-H4"]
    question_text:
      de: "Nutzt du aktuell nicht-freigegebene Tools (Shadow AI) für Arbeitszwecke?"
      en: "Do you currently use non-approved tools (shadow AI) for work purposes?"
    normalization_note:
      de: "In vielen Teams nutzen Mitarbeitende private AI-Tools, um produktiver zu sein — das ist ein häufiges und verständliches Verhalten. Deine ehrliche Antwort hilft uns, bessere offizielle Lösungen zu schaffen."
      en: "In many teams, people use private AI tools to be more productive — this is a common and understandable behavior. Your honest answer helps us create better official solutions."
    description:
      de: "Anonym, nur Trend wird ausgewertet"
      en: "Anonymous, only trend is evaluated"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "never"
        de: "Nie"
        en: "Never"
        order: 1
      - key: "rarely"
        de: "Selten"
        en: "Rarely"
        order: 2
      - key: "occasionally"
        de: "Gelegentlich"
        en: "Occasionally"
        order: 3
      - key: "frequently"
        de: "Häufig"
        en: "Frequently"
        order: 4
      - key: "regularly"
        de: "Regelmäßig / Täglich"
        en: "Regularly / Daily"
        order: 5
    order: 10

  # ---------------------------------------------------------------------------
  # F — Flow & Process Integration
  # ---------------------------------------------------------------------------
  - question_key: "F-M1"
    dimension: "F"
    question_type: "maturity"
    deep_dive_sub_topics: ["bottleneck_awareness", "ai_workflow_integration", "impact_reduction", "flow_measurement"]
    question_text:
      de: "Welche Stufe beschreibt die AI-Integration in eure Team-Workflows am besten?"
      en: "Which level best describes AI integration into your team workflows?"
    maturity_levels:Mache mir aus deine Analyse eine übersichtliche HTML Seite.
      1:
        label: "Exploring"Mache mir aus deine Analyse eine übersichtliche HTML Seite.
        de: "AI wird bei uns nicht in Prozesse/Workflows eingebunden."
        en: "AI is not incorporated into our processes/workflows."
      2:
        label: "Experimenting"Mache mir aus deine Analyse eine übersichtliche HTML Seite.
        de: "Einzelne nutzen AI nebenbei (z.B. Chat), aber es ist kein Teil unserer Team-Workflows."
        en: "Individuals use AI on the side (e.g. chat), but it's not part of our team workflows."
      3:
        label: "Embedding"
        de: "Wir haben erste AI-gestützte Workflows (z.B. PR Pre-Review, Testgenerierung), aber die meisten Prozesse laufen wie vorher."
        en: "We have initial AI-supported workflows (e.g. PR pre-review, test generation), but most processes run as before."
      4:
        label: "Scaling"
        de: "AI ist in mehreren Kern-Workflows eingebettet und reduziert messbar Wartezeiten oder Rework."
        en: "AI is embedded in multiple core workflows and measurably reduces wait times or rework."
      5:
        label: "Evolving"
        de: "AI ist systematisch in unsere Wertschöpfungskette integriert; Bottlenecks werden datengetrieben identifiziert und adressiert."
        en: "AI is systematically integrated into our value stream; bottlenecks are identified and addressed data-driven."
    order: 11

  - question_key: "F-MC1"
    dimension: "F"
    question_type: "diagnostic"
    question_text:
      de: "Wo ist euer grösster Prozess-Bottleneck aktuell?"
      en: "Where is your biggest process bottleneck currently?"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "pr_review"
        de: "PR Review"
        en: "PR Review"
        order: 1
      - key: "qa_testing"
        de: "QA / Testing"
        en: "QA / Testing"
        order: 2
      - key: "release_approvals"
        de: "Release Approvals"
        en: "Release Approvals"
        order: 3
      - key: "environments"
        de: "Umgebungen"
        en: "Environments"
        order: 4
      - key: "requirements"
        de: "Anforderungen / Refinement"
        en: "Requirements / Refinement"
        order: 5
      - key: "dependencies"
        de: "Abhängigkeiten (andere Teams)"
        en: "Dependencies (other teams)"
        order: 6
      - key: "none"
        de: "Keiner dominant"
        en: "None dominant"
        order: 7
      - key: "other"
        de: "Anderes"
        en: "Other"
        order: 8
    order: 12

  - question_key: "F-MC2"
    dimension: "F"
    question_type: "diagnostic"
    question_text:
      de: "Welche AI-Intervention würde euch am ehesten helfen?"
      en: "Which AI intervention would help you most?"
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: "pr_prereview"
        de: "PR Pre-Review"
        en: "PR Pre-Review"
        order: 1
      - key: "testdata"
        de: "Testdaten-Generierung"
        en: "Test data generation"
