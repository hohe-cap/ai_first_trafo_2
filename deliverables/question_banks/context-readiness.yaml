        The business pain determines which CRAFT dimensions to prioritize
        and what maturity level the team actually needs to drive impact.
        Without this anchor, the transformation lacks outcome orientation.
    adaptive_impact:
      de: >-
        Freitext wird vom AI Transformation Manager interpretiert und mit ctx_main_goal
        abgeglichen. Weicht der kommunizierte Schmerz vom gewaehlten Hauptziel ab,
        entsteht eine Klaerungsfrage fuer das naechste Gespraech.
      en: >-
        Free text is interpreted by the AI Transformation Manager and cross-referenced
        with ctx_main_goal. If the stated pain diverges from the chosen main goal,
        this surfaces a clarification question for the next conversation.
    discovery_guide_reference: "deliverables/question_banks/business-impact-discovery.md"
    order: 18

