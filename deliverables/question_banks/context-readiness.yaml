  - question_key: "ctx_contract_model"
    section: "context"
    category: "ways_of_working"
    question_text:
      de: "Welches Vertragsmodell gilt für dieses Projekt?"
      en: "What contract model applies to this project?"
    description:
      de: >-
        KRITISCH fuer Incentive-Alignment: Bei T&M kann AI-Produktivitaet
        zu weniger abrechenbaren Stunden fuehren (Fehlanreiz).
      en: >-
        CRITICAL for incentive alignment: With T&M, AI productivity
        can lead to fewer billable hours (misaligned incentives).
    answer_type: "single_choice"
    answer_options:
      - key: "time_material"
        de: "Time & Material (Abrechnung nach Aufwand)"
        en: "Time & Material (billed by effort)"
        incentive_risk: "high"
        order: 1
      - key: "fixed_price"
        de: "Fixed Price (Festpreis)"
        en: "Fixed Price"
        incentive_risk: "low"
        order: 2
      - key: "value_based"
        de: "Value-Based / Outcome-Based"
        en: "Value-Based / Outcome-Based"
        incentive_risk: "none"
        order: 3
      - key: "hybrid"
