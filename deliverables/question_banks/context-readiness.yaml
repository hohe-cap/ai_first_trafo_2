# =============================================================================
# CRAFT Context & Readiness Exploration (Ebene 1)
# =============================================================================
# One-time exploration at the start of a transformation engagement.
# Captures project context and diagnoses transformation readiness.
# Output feeds into adaptive filtering for Pulse Check (Ebene 2).
#
# IMPORTANT: This exploration is fundamentally different from Pulse Check and
# Deep-Dives. It captures FACTS and CONDITIONS, not opinions or maturity.
# See METHODOLOGY.md Section 1 for details on this distinction.
#
# Version: 2.0
# Last Updated: 2026-02-12
# Total Questions: 35 (17 Context + 18 Readiness)
# Estimated Duration: 25-30 minutes
# =============================================================================

version: "2.0"
exploration_type: "context_readiness"
description:
  de: >-
    Einmalige Exploration zu Beginn einer Transformationsbegleitung.
    Erfasst den Projektkontext und diagnostiziert die Transformations-Readiness
    als Grundlage fuer adaptive Pulse Checks und gezielte Interventionen.
  en: >-
    One-time exploration at the start of a transformation engagement.
    Captures project context and diagnoses transformation readiness
    as foundation for adaptive pulse checks and targeted interventions.
estimated_duration_minutes: 30
frequency: "once_at_kickoff"
respondent: "AI Transformation Manager / Technical Lead (1-2 persons, not anonymous)"
methodology_reference: "METHODOLOGY.md"

# =============================================================================
# SECTIONS
# =============================================================================
sections:
  - key: "context"
    name:
      de: "Kontext-Erfassung"
      en: "Context Exploration"
    description:
      de: "Projektrahmen, Business-Kontext, Tech-Stack und Arbeitsweise"
      en: "Project framework, business context, tech stack and working methods"
    estimated_duration_minutes: 10
    purpose:
      de: >-
        Bestimmt Compliance-Tier, Tech-Pattern und Culture-Pattern.
        Steuert adaptives Filtering fuer Pulse Check und Deep-Dives.
      en: >-
        Determines compliance tier, tech pattern and culture pattern.
        Controls adaptive filtering for pulse check and deep-dives.

  - key: "readiness"
    name:
      de: "Readiness Exploration"
      en: "Readiness Exploration"
    description:
      de: "Leadership, Skills, Infrastruktur, Kultur und Prozesse"
      en: "Leadership, skills, infrastructure, culture and processes"
    estimated_duration_minutes: 20
    purpose:
      de: >-
        Diagnostiziert Transformations-Readiness ueber 5 Dimensionen.
        Ergebnis bestimmt ob erweitert, vertieft oder konsolidiert wird.
      en: >-
        Diagnoses transformation readiness across 5 dimensions.
        Result determines whether to expand, deepen or consolidate.

# =============================================================================
# CATEGORIES
# =============================================================================
categories:
  # --- Context Categories ---
  - key: "project_basics"
    section: "context"
    name:
      de: "Projekt-Basics"
      en: "Project Basics"
    description:
      de: "Team-Groesse, Laufzeit, Phase und Typ"
      en: "Team size, duration, phase and type"
    why_important:
      de: >-
        Bestimmt den Skalierungs-Ansatz und die Change-Komplexitaet.
        Solo/Klein braucht andere Strategien als Enterprise.
      en: >-
        Determines scaling approach and change complexity.
        Solo/small needs different strategies than enterprise.
    order: 1

  - key: "business_context"
    section: "context"
    name:
      de: "Business-Kontext & Compliance"
      en: "Business Context & Compliance"
    description:
      de: "Branche, Regulierung, Datenverarbeitung, Vertragsmodell"
      en: "Industry, regulation, data processing, contract model"
    why_important:
      de: >-
        Regulatorische Anforderungen und Vertragsmodelle definieren die
        Grenzen des Moeglichen. Banking braucht andere Strategien als Startups.
        Das Vertragsmodell bestimmt Incentive-Alignment.
      en: >-
        Regulatory requirements and contract models define the boundaries
        of what's possible. Banking needs different strategies than startups.
        The contract model determines incentive alignment.
    order: 2

  - key: "tech_landscape"
    section: "context"
    name:
      de: "Technologie-Landschaft"
      en: "Technology Landscape"
    description:
      de: "Programmiersprachen, Legacy-Anteil, Deployment-Frequenz"
      en: "Programming languages, legacy share, deployment frequency"
    why_important:
      de: >-
        Der Tech-Stack bestimmt welche AI-Tools sofort einsetzbar sind und
        wo technische Schulden erst abgebaut werden muessen.
      en: >-
        The tech stack determines which AI tools can be used immediately
        and where technical debt must be addressed first.
    order: 3

  - key: "ways_of_working"
    section: "context"
    name:
      de: "Arbeitsweise"
      en: "Ways of Working"
    description:
      de: "Methodik, Kollaboration, Vertragsmodell"
      en: "Methodology, collaboration, contract model"
    why_important:
      de: >-
        Die Arbeitsweise zeigt wie experimentierfreudig das Team ist.
        Wasserfall-Teams brauchen andere Change-Strategien als DevOps-Teams.
      en: >-
        Working methods show how experimental the team is.
        Waterfall teams need different change strategies than DevOps teams.
    order: 4

  - key: "goals_timeline"
    section: "context"
    name:
      de: "Ziele & Rahmenbedingungen"
      en: "Goals & Constraints"
    description:
      de: "Hauptziel, Budget, Timeline"
      en: "Main goal, budget, timeline"
    why_important:
      de: >-
        Zeitliche und finanzielle Constraints definieren welche Quick Wins
        realistisch sind und wo langfristige Investments noetig sind.
      en: >-
        Time and financial constraints define which quick wins are realistic
        and where long-term investments are needed.
    order: 5

  # --- Readiness Categories ---
  - key: "leadership"
    section: "readiness"
    name:
      de: "Leadership & Commitment"
      en: "Leadership & Commitment"
    description:
      de: "Executive Sponsorship, Budget, Change Management Ressourcen"
      en: "Executive sponsorship, budget, change management resources"
    why_important:
      de: >-
        Ohne Top-Level-Support scheitern 70% aller Transformationsprojekte
        innerhalb des ersten Jahres (Kotter, Prosci).
      en: >-
        Without top-level support, 70% of transformation projects fail
        within the first year (Kotter, Prosci).
    weight_in_readiness_score: 0.25
    order: 6

  - key: "skills"
    section: "readiness"
    name:
      de: "Skills & Faehigkeiten"
      en: "Skills & Capabilities"
    description:
      de: "AI-Exposure, Lernkultur, Trainingskapazitaet"
      en: "AI exposure, learning culture, training capacity"
    why_important:
      de: >-
        Aktuelle Skill-Level bestimmen den Startpunkt.
        Lernkultur bestimmt die Adoptionsgeschwindigkeit.
      en: >-
        Current skill levels determine the starting point.
        Learning culture determines adoption speed.
    weight_in_readiness_score: 0.20
    order: 7

  - key: "infrastructure"
    section: "readiness"
    name:
      de: "Infrastruktur & Tools"
      en: "Infrastructure & Tools"
    description:
      de: "API-Zugang, Tool-Flexibilitaet, Datenklassifizierung, Security"
      en: "API access, tool flexibility, data classification, security"
    why_important:
      de: >-
        Technische Grundvoraussetzungen bestimmen was ueberhaupt moeglich ist.
        Gesperrte Umgebungen brauchen andere Strategien als offene.
      en: >-
        Technical prerequisites determine what is possible at all.
        Locked-down environments need different strategies than open ones.
    weight_in_readiness_score: 0.25
    order: 8

  - key: "culture"
    section: "readiness"
    name:
      de: "Kultur & Mindset"
      en: "Culture & Mindset"
    description:
      de: "Fehlertoleranz, Innovationszeit, Prozessflexibilitaet"
      en: "Failure tolerance, innovation time, process flexibility"
    why_important:
      de: >-
        Psychologische Sicherheit und Experimentierfreiheit sind die
        staerksten Praediktoren fuer erfolgreiche AI-Adoption.
      en: >-
        Psychological safety and freedom to experiment are the
        strongest predictors of successful AI adoption.
    weight_in_readiness_score: 0.15
    order: 9

  - key: "processes"
    section: "readiness"
    name:
      de: "Prozesse & Workflows"
      en: "Processes & Workflows"
    description:
      de: "Bottleneck-Identifikation, Zeitverteilung, Prozessreife"
      en: "Bottleneck identification, time distribution, process maturity"
    why_important:
      de: >-
        Value Stream First: AI-Interventionen muessen dort ansetzen,
        wo die groessten Bottlenecks sind. Ohne Prozessverstaendnis
        optimieren wir an der falschen Stelle.
      en: >-
        Value Stream First: AI interventions must target the biggest
        bottlenecks. Without process understanding we optimize in
        the wrong place.
    weight_in_readiness_score: 0.15
    order: 10

# =============================================================================
# QUESTIONS — CONTEXT SECTION (17 Questions)
# =============================================================================
questions:

  # ---------------------------------------------------------------------------
  # Category: project_basics (4 Questions)
  # ---------------------------------------------------------------------------
  - question_key: "ctx_team_size"
    section: "context"
    category: "project_basics"
    question_text:
      de: "Wie gross ist das Projekt-Team?"
      en: "How large is the project team?"
    answer_type: "single_choice"
    answer_options:
      - key: "solo"
        de: "Solo (1 Person)"
        en: "Solo (1 person)"
        order: 1
      - key: "small"
        de: "Klein (2-5 Personen)"
        en: "Small (2-5 people)"
        order: 2
      - key: "medium"
        de: "Mittel (6-15 Personen)"
        en: "Medium (6-15 people)"
        order: 3
      - key: "large"
        de: "Gross (16-30 Personen)"
        en: "Large (16-30 people)"
        order: 4
      - key: "enterprise"
        de: "Enterprise (>30 Personen)"
        en: "Enterprise (>30 people)"
        order: 5
    adaptive_impact:
      de: "Solo/Klein → Governance-Fragen ueberspringen; Gross/Enterprise → Change Coalition Fragen hinzufuegen"
      en: "Solo/Small → Skip governance questions; Large/Enterprise → Add change coalition questions"
    order: 1

  - question_key: "ctx_project_duration"
    section: "context"
    category: "project_basics"
    question_text:
      de: "Wie lange laeuft das Projekt bereits?"
      en: "How long has the project been running?"
    answer_type: "single_choice"
    answer_options:
      - key: "new"
        de: "Neu (0-3 Monate)"
        en: "New (0-3 months)"
        order: 1
      - key: "young"
        de: "Jung (3-12 Monate)"
        en: "Young (3-12 months)"
        order: 2
      - key: "established"
        de: "Etabliert (1-3 Jahre)"
        en: "Established (1-3 years)"
        order: 3
      - key: "legacy"
        de: "Legacy (>3 Jahre)"
        en: "Legacy (>3 years)"
        order: 4
    adaptive_impact:
      de: "Neu → AI-First Setup fokussieren; Legacy → Workflow-Redesign und Tech-Debt priorisieren"
      en: "New → Focus AI-first setup; Legacy → Prioritize workflow redesign and tech debt"
    order: 2

  - question_key: "ctx_project_phase"
    section: "context"
    category: "project_basics"
    question_text:
      de: "In welcher Phase befindet sich das Projekt?"
      en: "What phase is the project in?"
    answer_type: "single_choice"
    answer_options:
      - key: "discovery"
        de: "Discovery / Planning"
        en: "Discovery / Planning"
        order: 1
      - key: "development"
        de: "Aktive Entwicklung"
        en: "Active Development"
        order: 2
      - key: "maintenance"
        de: "Wartung / Support"
        en: "Maintenance / Support"
        order: 3
      - key: "transition"
        de: "Transition / Sunset"
        en: "Transition / Sunset"
        order: 4
    adaptive_impact:
      de: "Discovery → Architecture-Design Fragen; Maintenance → Tool-Optimierung fokussieren"
      en: "Discovery → Architecture design questions; Maintenance → Focus tool optimization"
    order: 3

  - question_key: "ctx_project_type"
    section: "context"
    category: "project_basics"
    question_text:
      de: "Was ist der Haupt-Projekt-Typ?"
      en: "What is the main project type?"
    answer_type: "single_choice"
    answer_options:
      - key: "greenfield"
        de: "Greenfield (Neuentwicklung)"
        en: "Greenfield (new development)"
        order: 1
      - key: "brownfield"
        de: "Brownfield (bestehende Codebase)"
        en: "Brownfield (existing codebase)"
        order: 2
      - key: "modernization"
        de: "Modernisierung (Legacy → Modern)"
        en: "Modernization (Legacy → Modern)"
        order: 3
      - key: "maintenance"
        de: "Wartung / Support"
        en: "Maintenance / Support"
        order: 4
    order: 4

  # ---------------------------------------------------------------------------
  # Category: business_context (4 Questions)
  # ---------------------------------------------------------------------------
  - question_key: "ctx_industry"
    section: "context"
    category: "business_context"
    question_text:
      de: "In welcher Branche ist der Kunde / die Organisation taetig?"
      en: "What industry is the customer / organization in?"
    answer_type: "single_choice"
    answer_options:
      - key: "banking"
        de: "Banking / Finance"
        en: "Banking / Finance"
        compliance_tier: 3
        order: 1
      - key: "healthcare"
        de: "Healthcare / Pharma"
        en: "Healthcare / Pharma"
        compliance_tier: 3
        order: 2
      - key: "insurance"
        de: "Versicherung"
        en: "Insurance"
        compliance_tier: 3
        order: 3
      - key: "automotive"
        de: "Automotive / Manufacturing"
        en: "Automotive / Manufacturing"
        compliance_tier: 2
        order: 4
      - key: "public_sector"
        de: "Oeffentlicher Sektor"
        en: "Public Sector"
        compliance_tier: 2
        order: 5
      - key: "technology"
        de: "Technology / Software"
        en: "Technology / Software"
        compliance_tier: 1
        order: 6
      - key: "retail"
        de: "Retail / E-Commerce"
        en: "Retail / E-Commerce"
        compliance_tier: 1
        order: 7
      - key: "startup"
        de: "Startup / Scale-Up"
        en: "Startup / Scale-Up"
        compliance_tier: 1
        order: 8
      - key: "other"
        de: "Andere"
        en: "Other"
        compliance_tier: 2
        order: 9
    adaptive_impact:
      de: "Tier 3 (Banking/Healthcare) → Compliance-Fragen priorisieren, Public-AI einschraenken; Tier 1 → Standard"
      en: "Tier 3 (Banking/Healthcare) → Prioritize compliance, restrict public AI; Tier 1 → Standard"
    order: 5

  - question_key: "ctx_data_location"
    section: "context"
    category: "business_context"
    question_text:
      de: "Wo duerfen Daten in diesem Projekt verarbeitet werden?"
      en: "Where can data be processed in this project?"
    answer_type: "single_choice"
    answer_options:
      - key: "eu_only"
        de: "EU-Only (DSGVO-strict)"
        en: "EU-Only (GDPR-strict)"
        order: 1
      - key: "us_acceptable"
        de: "US akzeptabel (Angemessenheitsbeschluss)"
        en: "US acceptable (adequacy decision)"
        order: 2
      - key: "global"
        de: "Global / flexibel"
        en: "Global / flexible"
        order: 3
      - key: "on_premise"
        de: "On-Premise only"
        en: "On-premise only"
        order: 4
    adaptive_impact:
      de: "EU-Only → Nur EU-gehostete AI-Tools; On-Premise → Nur Self-Hosted (Ollama, vLLM)"
      en: "EU-Only → Only EU-hosted AI tools; On-Premise → Only self-hosted (Ollama, vLLM)"
    order: 6

  - question_key: "ctx_code_ownership"
    section: "context"
    category: "business_context"
    question_text:
      de: "Wem gehoert der Code?"
      en: "Who owns the code?"
    answer_type: "single_choice"
    answer_options:
      - key: "customer"
        de: "Kunde (IP-Transfer)"
        en: "Customer (IP transfer)"
        order: 1
      - key: "shared"
        de: "Geteilt (Joint Ownership)"
        en: "Shared (joint ownership)"
        order: 2
      - key: "own_ip"
        de: "Eigenes IP (Produkt)"
        en: "Own IP (product)"
        order: 3
    adaptive_impact:
      de: "Kunde → Kunden-Approval fuer AI-Tools erforderlich; Eigenes IP → Volle Freiheit"
      en: "Customer → Customer approval required for AI tools; Own IP → Full freedom"
    order: 7

  - question_key: "ctx_criticality"
    section: "context"
    category: "business_context"
    question_text:
      de: "Wie kritisch ist das Projekt fuer das Business?"
      en: "How critical is the project for the business?"
    answer_type: "single_choice"
    answer_options:
      - key: "mission_critical"
        de: "Mission-Critical (Revenue-Impact)"
        en: "Mission-Critical (revenue impact)"
        order: 1
      - key: "business_critical"
        de: "Business-Critical (Operations)"
        en: "Business-Critical (operations)"
        order: 2
      - key: "important"
        de: "Important (Support)"
        en: "Important (support)"
        order: 3
      - key: "experimental"
        de: "Experimental (Innovation)"
        en: "Experimental (innovation)"
        order: 4
    adaptive_impact:
      de: "Mission-Critical → Structured rollout, Risk Management; Experimental → Fast rollout"
      en: "Mission-Critical → Structured rollout, risk management; Experimental → Fast rollout"
    order: 8

  # ---------------------------------------------------------------------------
  # Category: tech_landscape (3 Questions)
  # ---------------------------------------------------------------------------
  - question_key: "ctx_languages"
    section: "context"
    category: "tech_landscape"
    question_text:
      de: "Welche Programmiersprachen werden hauptsaechlich verwendet?"
      en: "What programming languages are primarily used?"
    answer_type: "multiple_choice"
    allow_multiple: true
    answer_options:
      - key: "python"
        de: "Python"
        en: "Python"
        order: 1
      - key: "java_kotlin"
        de: "Java / Kotlin"
        en: "Java / Kotlin"
        order: 2
      - key: "javascript_typescript"
        de: "JavaScript / TypeScript"
        en: "JavaScript / TypeScript"
        order: 3
      - key: "csharp_dotnet"
        de: "C# / .NET"
        en: "C# / .NET"
        order: 4
      - key: "go"
        de: "Go"
        en: "Go"
        order: 5
      - key: "cpp"
        de: "C / C++"
        en: "C / C++"
        order: 6
      - key: "ruby"
        de: "Ruby"
        en: "Ruby"
        order: 7
      - key: "php"
        de: "PHP"
        en: "PHP"
        order: 8
      - key: "other"
        de: "Andere"
        en: "Other"
        order: 9
    adaptive_impact:
      de: "Bestimmt Tech-Pattern fuer Tool-Empfehlungen (z.B. Python → Copilot + Cursor + Ruff)"
      en: "Determines tech pattern for tool recommendations (e.g. Python → Copilot + Cursor + Ruff)"
    order: 9

  - question_key: "ctx_legacy_percentage"
    section: "context"
    category: "tech_landscape"
    question_text:
      de: "Wie hoch ist der Legacy-Code-Anteil?"
      en: "What is the legacy code share?"
    answer_type: "single_choice"
    answer_options:
      - key: "none"
        de: "Kein Legacy (100% modern)"
        en: "No legacy (100% modern)"
        order: 1
      - key: "low"
        de: "Wenig (<20%)"
        en: "Low (<20%)"
        order: 2
      - key: "moderate"
        de: "Moderat (20-50%)"
        en: "Moderate (20-50%)"
        order: 3
      - key: "high"
        de: "Hoch (50-80%)"
        en: "High (50-80%)"
        order: 4
      - key: "mostly"
        de: "Ueberwiegend Legacy (>80%)"
        en: "Mostly legacy (>80%)"
        order: 5
    adaptive_impact:
      de: "Hoch/Ueberwiegend → Tech-Debt-Reduktion priorisieren; Kein Legacy → Advanced AI Patterns"
      en: "High/Mostly → Prioritize tech debt reduction; No legacy → Advanced AI patterns"
    order: 10

  - question_key: "ctx_deployment_frequency"
    section: "context"
    category: "tech_landscape"
    question_text:
      de: "Wie oft wird deployed?"
      en: "How often do you deploy?"
    description:
      de: "DORA-Baseline: Deployment Frequency ist einer der vier DORA-Key-Metrics"
      en: "DORA baseline: Deployment frequency is one of the four DORA key metrics"
    answer_type: "single_choice"
    answer_options:
      - key: "multiple_daily"
        de: "Mehrmals taeglich (Continuous Deployment)"
        en: "Multiple times daily (Continuous Deployment)"
        order: 1
      - key: "daily"
        de: "Taeglich"
        en: "Daily"
        order: 2
      - key: "weekly"
        de: "Woechentlich"
        en: "Weekly"
        order: 3
      - key: "monthly"
        de: "Monatlich"
        en: "Monthly"
        order: 4
      - key: "less"
        de: "Seltener"
        en: "Less frequently"
        order: 5
    order: 11

  # ---------------------------------------------------------------------------
  # Category: ways_of_working (3 Questions)
  # ---------------------------------------------------------------------------
  - question_key: "ctx_methodology"
    section: "context"
    category: "ways_of_working"
    question_text:
      de: "Welche Entwicklungs-Methodik wird verwendet?"
      en: "What development methodology is used?"
    answer_type: "single_choice"
    answer_options:
      - key: "scrum"
        de: "Scrum"
        en: "Scrum"
        order: 1
      - key: "kanban"
        de: "Kanban"
        en: "Kanban"
        order: 2
      - key: "safe"
        de: "SAFe (Scaled Agile)"
        en: "SAFe (Scaled Agile)"
        order: 3
      - key: "waterfall"
        de: "Wasserfall"
        en: "Waterfall"
        order: 4
      - key: "adhoc"
        de: "Ad-hoc / kein formaler Prozess"
        en: "Ad-hoc / no formal process"
        order: 5
    order: 12

  - question_key: "ctx_collaboration_model"
    section: "context"
    category: "ways_of_working"
    question_text:
      de: "Wie arbeitet das Team zusammen?"
      en: "How does the team collaborate?"
    answer_type: "single_choice"
    answer_options:
      - key: "remote_first"
        de: "Remote-First"
        en: "Remote-First"
        order: 1
      - key: "hybrid"
        de: "Hybrid"
        en: "Hybrid"
        order: 2
      - key: "office"
        de: "Office-Based"
        en: "Office-Based"
        order: 3
      - key: "async"
        de: "Async-First"
        en: "Async-First"
        order: 4
    adaptive_impact:
      de: "Remote/Async → AI-Pairing-Tools wichtiger; Office → In-Person + AI Hybrid"
      en: "Remote/Async → AI pairing tools more important; Office → In-person + AI hybrid"
    order: 13

  - question_key: "ctx_contract_model"
    section: "context"
    category: "ways_of_working"
    question_text:
      de: "Welches Vertragsmodell gilt fuer dieses Projekt?"
      en: "What contract model applies to this project?"
    description:
      de: >-
        KRITISCH fuer Incentive-Alignment: Bei T&M kann AI-Produktivitaet
        zu weniger abrechenbaren Stunden fuehren (Fehlanreiz).
      en: >-
        CRITICAL for incentive alignment: With T&M, AI productivity
        can lead to fewer billable hours (misaligned incentives).
    answer_type: "single_choice"
    answer_options:
      - key: "time_material"
        de: "Time & Material (Abrechnung nach Aufwand)"
        en: "Time & Material (billed by effort)"
        incentive_risk: "high"
        order: 1
      - key: "fixed_price"
        de: "Fixed Price (Festpreis)"
        en: "Fixed Price"
        incentive_risk: "low"
        order: 2
      - key: "value_based"
        de: "Value-Based / Outcome-Based"
        en: "Value-Based / Outcome-Based"
        incentive_risk: "none"
        order: 3
      - key: "hybrid"
        de: "Hybrid (T&M + Success Bonus)"
        en: "Hybrid (T&M + success bonus)"
        incentive_risk: "medium"
        order: 4
      - key: "internal"
        de: "Internes Projekt (keine externe Abrechnung)"
        en: "Internal project (no external billing)"
        incentive_risk: "none"
        order: 5
    adaptive_impact:
      de: "T&M → Shadow-AI-Risiko pruefen, Gainsharing-Modelle empfehlen"
      en: "T&M → Check shadow AI risk, recommend gainsharing models"
    order: 14

