    why_important:
      de: "Gut dokumentierte Prozesse können einfacher durch AI optimiert werden"
      en: "Well-documented processes can be more easily optimized by AI"
    answer_type: "single_choice"
    answer_options:
      - key: "excellent"
        de: "Exzellent: Runbooks, SOPs, alle verstehen die Prozesse"
        en: "Excellent: Runbooks, SOPs, everyone understands processes"
        score: 100
        order: 1
      - key: "partial"
        de: "Teilweise: Kern-Prozesse klar, Details fehlen"
        en: "Partial: Core processes clear, details missing"
        score: 70
        order: 2
      - key: "implicit"
        de: "Implizites Wissen: Prozesse existieren, aber nicht dokumentiert"
        en: "Implicit knowledge: Processes exist but not documented"
        score: 30
        order: 3
      - key: "tribal"
        de: "Tribal Knowledge: Nur wenige wissen wie Dinge funktionieren"
        en: "Tribal knowledge: Only few know how things work"
        score: 0
        order: 4
    weight: 1.2
    order: 36

  - question_key: "rdy_commercial_flow_alignment"
    section: "readiness"
    category: "processes"
    question_text:
      de: "Wie gut unterstützt das aktuelle Vertragsmodell Investitionen in AI-Tooling und Transformation-Aufwände (Champions-Zeit, Workshops)?"
      en: "How well does the current contract model support investments in AI tooling and transformation efforts (champion time, workshops)?"
    why_important:
      de: >-
        T&M-Vertraege erzeugen einen systemischen Fehlanreiz: AI-Effizienz
        fuehrt zu weniger abrechenbaren Stunden. Champions-Kapazitaet,
        Tooling-Investitionen und VSM-Workshops lassen sich ohne Kunden-
        Anforderung kaum rechtfertigen (Commercial Flow Alignment).
      en: >-
        T&M contracts create a systemic misaligned incentive: AI efficiency
        leads to fewer billable hours. Champion capacity, tooling investments
        and VSM workshops are hard to justify without customer demand
        (Commercial Flow Alignment).
    answer_type: "single_choice"
    answer_options:
      - key: "fully_aligned"
        de: "Vollständig aligned: Outcome-Based / Gainsharing, Effizienz wird direkt belohnt"
        en: "Fully aligned: Outcome-Based / Gainsharing, efficiency is directly rewarded"
        score: 100
        order: 1
      - key: "partially_aligned"
        de: "Teilweise aligned: Hybrid-Modell oder Fixed Price, Effizienz = interne Marge"
        en: "Partially aligned: Hybrid or Fixed Price, efficiency equals internal margin"
        score: 70
        order: 2
      - key: "neutral"
        de: "Neutral: Internes Projekt, kein externer Abrechnungsdruck"
        en: "Neutral: Internal project, no external billing pressure"
        score: 60
        order: 3
      - key: "misaligned"
        de: "Misaligned: T&M, aber Kunde ist Transformation-Investitionen gegenüber offen"
        en: "Misaligned: T&M, but customer is open to transformation investments"
        score: 30
        order: 4
      - key: "blocking"
        de: "Blockierend: T&M, Kunde erwartet maximale Stunden-Auslastung ohne Spielraum"
        en: "Blocking: T&M, customer expects maximum hour utilization with no flexibility"
        score: 0
        order: 5
    weight: 1.3
    order: 37

  - question_key: "rdy_contract_transition_readiness"
    section: "readiness"
    category: "processes"
    question_text:
      de: "Gibt es Pläne oder aktive Gespräche, das Vertragsmodell in Richtung Outcome-Based oder Gainsharing weiterzuentwickeln?"
      en: "Are there plans or active discussions to evolve the contract model towards outcome-based or gainsharing?"
    why_important:
      de: >-
        Ohne expliziten Plan bleibt T&M ein dauerhafter struktureller
        Blocker fuer nachhaltige AI-Adoption. Der Uebergang zu AI-aligned
        Vertragsmodellen ist eine eigenstaendige Transformation-Intervention
        (Commercial Flow Alignment im AI Intervention Katalog).
      en: >-
        Without an explicit plan, T&M remains a permanent structural
        blocker for sustainable AI adoption. The transition to AI-aligned
        contract models is an independent transformation intervention
        (Commercial Flow Alignment in the AI Intervention Catalogue).
    answer_type: "single_choice"
    answer_options:
      - key: "in_progress"
        de: "Ja, Transition aktiv in Planung oder bereits umgesetzt"
        en: "Yes, transition actively planned or already implemented"
        score: 100
        order: 1
      - key: "discussed"
        de: "Thema bekannt, wird intern oder mit dem Kunden diskutiert"
        en: "Topic known, being discussed internally or with the customer"
        score: 70
        order: 2
      - key: "aware"
        de: "Bewusstsein für das Problem vorhanden, aber noch kein Plan"
        en: "Awareness of the problem exists, but no plan yet"
        score: 40
        order: 3
      - key: "not_relevant"
        de: "Nicht relevant (internes Projekt oder Modell bereits AI-aligned)"
        en: "Not relevant (internal project or model already AI-aligned)"
        score: 80
        order: 4
      - key: "no_awareness"
        de: "Kein Bewusstsein für das Problem / kein Plan"
        en: "No awareness of the problem / no plan"
        score: 0
        order: 5
    weight: 1.0
    order: 38

# =============================================================================
# SCORING
# =============================================================================
scoring:
  context:
    description:
      de: >-
        Context-Fragen generieren kein numerisches Scoring, sondern
        Pattern-Matches fuer adaptives Filtering.
      en: >-
        Context questions don't generate numeric scores, but
        pattern matches for adaptive filtering.
    derived_patterns:
      - name: "compliance_tier"
        description: "1 (Flexible) / 2 (Moderate) / 3 (Strict)"
        derived_from: ["ctx_industry", "ctx_data_location", "ctx_criticality"]
      - name: "tech_pattern"
        description: "e.g. python_web, java_enterprise, javascript_react"
        derived_from: ["ctx_languages"]
      - name: "culture_pattern"
        description: "safety_first / balanced / move_fast"
        derived_from: ["ctx_criticality", "rdy_failure_tolerance"]
      - name: "incentive_alignment"
        description: "aligned / misaligned / neutral"
        derived_from: ["ctx_contract_model"]

  readiness:
    description:
      de: >-
        Readiness-Score: Gewichteter Durchschnitt pro Kategorie, dann
        gewichtete Aggregation zum Gesamt-Readiness-Score (0-100%).
      en: >-
        Readiness score: Weighted average per category, then
        weighted aggregation to overall readiness score (0-100%).
    formula: >-
      Readiness = (Leadership x 0.25) + (Skills x 0.20) +
                  (Infrastructure x 0.25) + (Culture x 0.15) +
                  (Processes x 0.15)
    interpretation:
      ready:
        threshold: 70
        de: "Bereit für Transformation (Erweitern)"
        en: "Ready for transformation (Expand)"
      partially_ready:
        threshold: 50
        de: "Teilweise bereit — Lücken zürst adressieren (Vertiefen)"
        en: "Partially ready — address gaps first (Deepen)"
      not_ready:
        threshold: 0
        de: "Nicht bereit — Grundlagenarbeit nötig (Konsolidieren)"
        en: "Not ready — foundational work needed (Consolidate)"
