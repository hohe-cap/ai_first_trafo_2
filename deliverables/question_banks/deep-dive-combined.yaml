  - question_key: A-M-REGULARITY
    question_type: maturity
    sub_topic: usage_regularity
    question_text:
      de: Welche Stufe beschreibt deine tatsächliche AI-Nutzung am besten?
      en: Which level best describes your actual AI usage?
    maturity_levels:
      "1":
        label: Exploring
        de: Ich nutze keine AI-Tools für meine Arbeit.
        en: I don't use any AI tools for my work.
      "2":
        label: Experimenting
        de: Ich nutze AI gelegentlich für einfache Aufgaben (z.B. Textformulierung, Quick Qüstions), nicht regelmaessig.
        en: I use AI occasionally for simple tasks (e.g., text drafting, quick questions), not regularly.
      "3":
        label: Embedding
        de: Ich nutze AI regelmaessig (mind. wöchentlich) in 1-2 Arbeitsbereichen und es spart mir merklich Zeit.
        en: I use AI regularly (at least weekly) in 1-2 work areas and it noticeably saves me time.
      "4":
        label: Scaling
        de: AI ist fester Bestandteil meiner täglichen Arbeit in mehreren Bereichen und SDLC-Phasen.
        en: AI is an integral part of my daily work across multiple areas and SDLC phases.
      "5":
        label: Evolving
        de: AI ist durchgängig in meinen Workflow integriert; ich optimiere aktiv Prompts/Workflows und teile Best Practices.
        en: AI is fully integrated into my workflow; I actively optimize prompts/workflows and share best practices.
    order: 21
    dimension: A
  - question_key: A-M-DEPTH
    question_type: maturity
    sub_topic: usage_depth
    question_text:
      de: Welche Stufe beschreibt deinen typischen AI-Nutzungsmodus am besten?
      en: Which level best describes your typical AI usage mode?
    maturity_levels:
      "1":
        label: Exploring
        de: Ich nutze AI gar nicht.
        en: I don't use AI at all.
      "2":
        label: Experimenting
        de: Nur Chat-basiert (Q&A, Copy-Paste); AI ist ein separates Fenster, nicht in meine Tools integriert.
        en: Chat-based only (Q&A, copy-paste); AI is a separate window, not integrated into my tools.
      "3":
        label: Embedding
        de: AI ist in meiner IDE oder meinem Workflow integriert; ich nutze es Schritt-für-Schritt für bestimmte Aufgaben.
        en: AI is integrated in my IDE or workflow; I use it step-by-step for specific tasks.
      "4":
        label: Scaling
        de: Agentische Nutzung — AI übernimmt teilautonome Aufgaben (z.B. Coding-Tasks, Test-Generierung), ich reviewe die Ergebnisse.
        en: Agentic usage — AI handles semi-autonomous tasks (e.g., coding tasks, test generation), I review the results.
      "5":
        label: Evolving
        de: Multi-agentische Workflows; AI bearbeitet End-to-End-Aufgaben; ich orchestriere mehr als ich ausführe.
        en: Multi-agentic workflows; AI handles end-to-end tasks; I orchestrate rather than execute.
    order: 22
    dimension: A
  - question_key: A-M-QUALITY
    question_type: maturity
    sub_topic: output_trust
    question_text:
      de: Welche Stufe beschreibt deine Erfahrung mit der Qualität von AI-Outputs am besten?
      en: Which level best describes your experience with AI output quality?
    maturity_levels:
      "1":
        label: Exploring
        de: Ich habe keine Erfahrung mit AI-Outputs, um die Qualität beurteilen zu können.
        en: I have no experience with AI outputs to judge quality.
      "2":
        label: Experimenting
        de: AI-Output ist Glückssache; ich vertraue ihm oft nicht und mache die Arbeit am Ende doch selbst.
        en: AI output is hit-or-miss; I often don't trust it and end up doing the work myself.
      "3":
        label: Embedding
        de: AI liefert einen brauchbaren Startpunkt, der bearbeitet werden muss; ich kann meistens erkennen, wenn der Output falsch ist.
        en: AI provides a usable starting point that needs editing; I can usually tell when output is wrong.
      "4":
        label: Scaling
        de: AI-Output ist zuverlässig gut für meine Use Cases; ich habe gelernt, effektiv zu prompten; Review-Aufwand ist gering.
        en: AI output is reliably good for my use cases; I've learned to prompt effectively; review effort is low.
      "5":
        label: Evolving
        de: AI-Output ist hochwertig; ich habe eigene Prompts/Workflows gebaut, die konstant gute Ergebnisse liefern; ich lehre andere, gute Ergebnisse zu erzielen.
        en: AI output is high quality; I've built custom prompts/workflows that consistently deliver; I teach others to get good results.
