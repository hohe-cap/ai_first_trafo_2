  - question_key: T-M-AVAILABILITY
    question_type: maturity
    sub_topic: tool_availability
    question_text:
      de: Welche Stufe beschreibt die Verfügbarkeit von AI-Tools in deinem Arbeitsalltag am besten?
      en: Which level best describes the availability of AI tools in your daily work?
    maturity_levels:
      "1":
        label: Exploring
        de: Es gibt keine freigegebenen AI-Tools; wenn ich AI nutzen will, muss ich auf private Accounts oder inoffizielle Wege zurückgreifen.
        en: There are no approved AI tools; if I want to use AI, I have to fall back on personal accounts or unofficial channels.
      "2":
        label: Experimenting
        de: Ein erstes Tool ist verfügbar, aber nur für einen Teil des Teams oder nur für unkritische Daten; für sensible Bereiche gibt es keine Lösung.
        en: A first tool is available, but only for part of the team or only for non-critical data; for sensitive areas there's no solution.
      "3":
        label: Embedding
        de: AI-Tools sind für die meisten Teammitglieder verfügbar; mindestens eine Sicherheitsstufe deckt unseren Hauptbedarf ab.
        en: AI tools are available for most team members; at least one security tier covers our main needs.
      "4":
        label: Scaling
        de: Verschiedene Sicherheitsstufen stehen bereit; für jeden Datentyp gibt es eine passende Lösung; neue Tools werden schnell bereitgestellt.
        en: Different security tiers are available; for every data type there's a suitable solution; new tools are provisioned quickly.
      "5":
        label: Evolving
        de: Multi-Tier-Strategie ist Alltag; Teams können flexibel zwischen Modellen und Stufen wechseln; Self-Service-Provisioning für Standard-Tools.
        en: Multi-tier strategy is routine; teams can flexibly switch between models and tiers; self-service provisioning for standard tools.
    order: 39
    dimension: T
  - question_key: T-M-IDE
    question_type: maturity
    sub_topic: ide_integration
    question_text:
      de: Welche Stufe beschreibt die Integration von AI-Tools in deine Entwicklungsumgebung (IDE) am besten?
      en: Which level best describes the integration of AI tools into your development environment (IDE)?
    maturity_levels:
      "1":
        label: Exploring
        de: AI-Tools laufen ausserhalb meiner IDE (z.B. Browser-Tab); ich muss Copy-Paste verwenden, um Ergebnisse in meinen Code zu übertragen.
        en: AI tools run outside my IDE (e.g., browser tab); I need to copy-paste to transfer results into my code.
      "2":
        label: Experimenting
        de: Ein Plugin/Extension ist installiert, aber es funktioniert nur für einfache Dinge (z.B. Autocomplete); komplexere Features fehlen oder sind instabil.
        en: A plugin/extension is installed, but it only works for simple things (e.g., autocomplete); more complex features are missing or unstable.
      "3":
        label: Embedding
        de: AI ist in meiner IDE für Kernfeatures integriert (Autocomplete, Chat, Erklärungen); es funktioniert zuverlässig für Standard-Workflows.
        en: AI is integrated in my IDE for core features (autocomplete, chat, explanations); it works reliably for standard workflows.
      "4":
        label: Scaling
        de: "AI unterstützt mich durchgängig: Code-Generierung, Refactoring, Test-Erstellung, Dokumentation — alles direkt in der IDE; ich kann zwischen Modellen wechseln."
        en: "AI supports me throughout: code generation, refactoring, test creation, documentation — all directly in the IDE; I can switch between models."
      "5":
        label: Evolving
        de: AI ist tief in meinen gesamten Workflow integriert — agentic workflows, Multi-File-Änderungen, Context-aware Vorschläge; ich arbeite in einer AI-nativen Umgebung.
        en: AI is deeply integrated into my entire workflow — agentic workflows, multi-file changes, context-aware suggestions; I work in an AI-native environment.
    order: 40
    dimension: T
  - question_key: T-M-RELIABILITY
    question_type: maturity
    sub_topic: reliability
    question_text:
      de: Welche Stufe beschreibt die Zuverlässigkeit und Performance der AI-Tools am besten?
      en: Which level best describes the reliability and performance of AI tools?
    maturity_levels:
      "1":
        label: Exploring
        de: AI-Tools sind nicht verfügbar oder so instabil, dass ich sie nicht sinnvoll nutzen kann.
        en: AI tools are not available or so unstable that I can't use them meaningfully.
      "2":
        label: Experimenting
        de: Tools funktionieren manchmal, aber häufige Ausfälle, hohe Latenz oder Timeouts frustrieren und stören meinen Flow.
        en: Tools work sometimes, but frequent outages, high latency, or timeouts frustrate and disrupt my flow.
      "3":
        label: Embedding
        de: Tools laufen meistens stabil; gelegentliche Performance-Probleme, aber insgesamt akzeptabel für die tägliche Arbeit.
        en: Tools run mostly stable; occasional performance issues, but overall acceptable for daily work.
      "4":
        label: Scaling
        de: Tools sind zuverlässig und schnell; SLAs werden eingehalten; bei Problemen gibt es klare Supportwege und schnelle Lösungen.
        en: Tools are reliable and fast; SLAs are met; when problems occur, there are clear support channels and quick solutions.
      "5":
        label: Evolving
        de: Infrastructure-as-Code, automatisches Scaling, proaktives Monitoring; Performance wird kontinuierlich optimiert und Ausfälle sind selten.
        en: Infrastructure-as-code, automatic scaling, proactive monitoring; performance is continuously optimized and outages are rare.
    order: 41
    dimension: T
  - question_key: T-M-ECOSYSTEM
    question_type: maturity
    sub_topic: ecosystem
    question_text:
      de: Welche Stufe beschreibt das Ökosystem rund um eure AI-Tools (Prompt-Vorlagen, CI/CD-Integration, Dokumentation) am besten?
      en: Which level best describes the ecosystem around your AI tools (prompt templates, CI/CD integration, documentation)?
    maturity_levels:
      "1":
        label: Exploring
        de: Jeder arbeitet für sich; keine geteilten Prompts, keine Dokumentation, keine Integration in Build-Pipelines.
        en: Everyone works on their own; no shared prompts, no documentation, no integration into build pipelines.
      "2":
        label: Experimenting
        de: Einzelne teilen Prompts informell (z.B. Slack, persönliche Notizen); Dokumentation ist lückenhaft; CI/CD-Integration ist nicht vorhanden.
        en: Some share prompts informally (e.g., Slack, personal notes); documentation is patchy; CI/CD integration doesn't exist.
      "3":
        label: Embedding
        de: Es gibt eine zentrale Anlaufstelle (Wiki, Conflünce) für Prompts und Best Practices; erste AI-Schritte in Pipelines (z.B. AI Code Review); Setup-Doku vorhanden.
        en: There's a central resource (wiki, Confluence) for prompts and best practices; first AI steps in pipelines (e.g., AI code review); setup docs available.
      "4":
        label: Scaling
        de: Prompt Library ist technisch integriert (IDE-Snippets, MCP-Server); AI in CI/CD ist Standard (Review, Tests, Docs); Dokumentation ist aktuell und umfassend.
        en: Prompt library is technically integrated (IDE snippets, MCP server); AI in CI/CD is standard (review, tests, docs); documentation is current and comprehensive.
      "5":
        label: Evolving
        de: "Das Ökosystem entwickelt sich kontinuierlich weiter: Community-driven Prompt Library, AI-generierte Pipeline-Optimierung, automatische Docs-Updates; Teams tragen aktiv bei."
        en: "The ecosystem continuously evolves: community-driven prompt library, AI-generated pipeline optimization, automatic docs updates; teams actively contribute."
    order: 42
    dimension: T
