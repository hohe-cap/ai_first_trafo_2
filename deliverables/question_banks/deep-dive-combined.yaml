version: "2.0"
exploration_type: deep_dive
description:
  de: Vertiefende Analyse aller 5 CRAFT-Dimensionen. Bricht jede Dimension in 4 Sub-Topics auf, jeweils mit kalibrierter 5-Level-Maturity-Bewertung. Wird einmalig als Kickoff-Baseline und danach on-demand durchgeführt.
  en: In-depth analysis of all 5 CRAFT dimensions. Breaks each dimension into 4 sub-topics, each with calibrated 5-level maturity exploration. Conducted once as kickoff baseline and then on-demand.
estimated_duration_minutes: 90
frequency: once_at_kickoff_then_on_demand
respondent: All team members (individual, anonymous)
dimensions:
  - key: C
    name:
      de: Compliance & Governance
      en: Compliance & Governance
    order: 1
    sub_topics:
      - key: policy_clarity
        name:
          de: Policy-Klarheit & Zugänglichkeit
          en: Policy Clarity & Accessibility
        description:
          de: Sind AI-Policies klar, praxisnah, auffindbar und verständlich?
          en: Are AI policies clear, practical, findable, and understandable?
        order: 1
      - key: governance_speed
        name:
          de: Governance-Geschwindigkeit
          en: Governance Speed
        description:
          de: Wie schnell werden Governance-Entscheidungen und Tool-Freigaben getroffen?
          en: How quickly are governance decisions and tool approvals made?
        order: 2
      - key: data_classification
        name:
          de: Datenklassifizierung & Schutz
          en: Data Classification & Protection
        description:
          de: Wissen Teams welche Daten in welche AI-Tools eingegeben werden duerfen?
          en: Do teams know which data may be entered into which AI tools?
        order: 3
      - key: regulatory_readiness
        name:
          de: Regulatorische Readiness
          en: Regulatory Readiness
        description:
          de: Ist die Organisation auf EU AI Act, Betriebsrat und rechtliche Anforderungen vorbereitet?
          en: Is the organization prepared for EU AI Act, works council, and legal requirements?
        order: 4
  - key: R
    name:
      de: Readiness (Human & Cultural)
      en: Readiness (Human & Cultural)
    order: 2
    sub_topics:
      - key: psychological_safety
        name:
          de: Psychologische Sicherheit
          en: Psychological Safety
        description:
          de: Können Menschen mit AI experimentieren, ohne Angst vor Bewertung oder Bestrafung?
          en: Can people experiment with AI without fear of judgment or punishment?
        order: 1
      - key: skill_confidence
        name:
          de: Skill-Level & Vertrauen
          en: Skill Level & Confidence
        description:
          de: Fühlen sich Menschen sicher genug, AI-Tools effektiv zu nutzen?
          en: Do people feel confident enough to use AI tools effectively?
        order: 2
      - key: role_evolution
        name:
          de: Rollenentwicklung & Klarheit
          en: Role Evolution & Clarity
        description:
          de: Verstehen Menschen, wie sich ihre Rolle mit AI verändert?
          en: Do people understand how their role evolves with AI?
        order: 3
      - key: peer_support
        name:
          de: Peer-Support & Champions
          en: Peer Support & Champions
        description:
          de: Gibt es ein Unterstützungsnetzwerk (Champions, Pairing, Community)?
          en: Is there a support network (champions, pairing, community)?
        order: 4
  - key: A
    name:
      de: Adoption & Usage
      en: Adoption & Usage
    order: 3
    sub_topics:
      - key: usage_regularity
        name:
          de: Nutzungsbreite & Regelmaessigkeit
          en: Usage Breadth & Regularity
        description:
          de: Wie regelmaessig und breit wird AI über verschiedene Arbeitsbereiche genutzt?
          en: How regularly and broadly is AI used across different work areas?
        order: 1
      - key: usage_depth
        name:
          de: Nutzungstiefe (Usage Mode)
          en: Usage Depth (Usage Mode)
        description:
          de: Wie tief ist AI integriert — von Chat bis agentisch?
          en: How deeply is AI integrated — from chat to agentic?
        order: 2
      - key: output_trust
        name:
          de: Output-Qualität & Vertrauen
          en: Output Quality & Trust
        description:
          de: Ist der AI-Output nützlich und wird ihm vertraut?
          en: Is AI output useful and trusted?
        order: 3
      - key: knowledge_sharing
        name:
          de: Wissensteilung & Best Practices
          en: Knowledge Sharing & Best Practices
        description:
          de: Werden Erfahrungen, Prompts und Best Practices systematisch geteilt?
          en: Are experiences, prompts, and best practices shared systematically?
        order: 4
  - key: F
    name:
      de: Flow & Process Integration
      en: Flow & Process Integration
    order: 4
    sub_topics:
      - key: bottleneck_awareness
        name:
          de: Bottleneck-Bewusstsein
          en: Bottleneck Awareness
        description:
          de: Wissen Teams, wo ihre grössten Verzögerungen im Delivery-Prozess liegen?
          en: Do teams know where their biggest delays in the delivery process are?
        order: 1
      - key: ai_workflow_integration
        name:
          de: AI-Workflow-Integration
          en: AI Workflow Integration
        description:
          de: Ist AI in Team-Workflows eingebettet (nicht nur individuelle Nutzung)?
          en: Is AI embedded in team workflows (not just individual usage)?
        order: 2
      - key: impact_reduction
        name:
          de: Wartezeit- & Rework-Reduktion
          en: Wait Time & Rework Reduction
        description:
          de: Hat AI messbar Wartezeiten oder Nacharbeit reduziert?
          en: Has AI measurably reduced wait times or rework?
        order: 3
      - key: flow_measurement
        name:
          de: Flow-Messung & Sichtbarkeit
          en: Flow Measurement & Visibility
        description:
          de: Werden Flow-Metriken (DORA, Cycle Time) gemessen und genutzt?
          en: Are flow metrics (DORA, cycle time) measured and used?
        order: 4
  - key: T
    name:
      de: Technical Enablement
      en: Technical Enablement
    order: 5
    sub_topics:
      - key: tool_availability
        name:
          de: Tool-Verfügbarkeit & Sicherheitsstufen
          en: Tool Availability & Security Tiers
        description:
          de: Sind AI-Tools über verschiedene Sicherheitsstufen verfügbar und zugänglich?
          en: Are AI tools available and accessible across different security tiers?
        order: 1
      - key: ide_integration
        name:
          de: IDE-Integration & Developer Experience
          en: IDE Integration & Developer Experience
        description:
          de: Wie nahtlos sind AI-Tools in die tägliche Entwicklungsumgebung integriert?
          en: How seamlessly are AI tools integrated into the daily development environment?
        order: 2
      - key: reliability
        name:
          de: Zuverlässigkeit & Performance
          en: Reliability & Performance
        description:
          de: Sind AI-Tools stabil, schnell und zuverlässig nutzbar?
          en: Are AI tools stable, fast, and reliably usable?
        order: 3
      - key: ecosystem
        name:
          de: Ecosystem-Reife (Prompt Library, CI/CD, Docs)
          en: Ecosystem Maturity (Prompt Library, CI/CD, Docs)
        description:
          de: Existiert ein reifes Ökosystem rund um die AI-Tools (Prompt-Vorlagen, Pipeline-Integration, Dokumentation)?
          en: Does a mature ecosystem exist around the AI tools (prompt templates, pipeline integration, documentation)?
        order: 4
questions:
  - question_key: C-CTX-1
    question_type: context
    sub_topic: null
    question_text:
      de: Gibt es eine schriftliche AI-Nutzungs-Policy in eurer Organisation?
      en: Is there a written AI usage policy in your organization?
    why_important:
      de: "Faktische Grundlage: Ohne Policy agieren Teams im Graubereich."
      en: "Factual basis: Without policy, teams operate in gray areas."
    answer_type: single_choice
    answer_options:
      - key: comprehensive_official
        de: Ja, umfassend und offiziell verabschiedet
        en: Yes, comprehensive and officially adopted
        order: 1
      - key: exists_limited
        de: Ja, aber nur für bestimmte Bereiche oder zu allgemein
        en: Yes, but only for specific areas or too general
        order: 2
      - key: draft_only
        de: Nur als Entwurf vorhanden, nicht offiziell
        en: Only available as draft, not official
        order: 3
      - key: no_policy
        de: Nein, keine Policy vorhanden
        en: No, no policy available
        order: 4
      - key: unknown
        de: Weiss nicht / nicht bekannt
        en: Don't know / not known
        order: 5
    scoring_note: Context only — does not feed into spider score directly
    order: 1
    dimension: C
  - question_key: C-CTX-2
    question_type: context
    sub_topic: null
    question_text:
      de: Wie lange dauert typischerweise die Freigabe eines neuen AI-Tools (von Anfrage bis produktive Nutzung)?
      en: How long does approval of a new AI tool typically take (from request to productive use)?
    why_important:
      de: "Metrik: Time-to-approval ist ein KPI für Governance-Effizienz."
      en: "Metric: Time-to-approval is a KPI for governance efficiency."
    answer_type: single_choice
    answer_options:
      - key: under_1_week
        de: Unter 1 Woche
        en: Under 1 week
        order: 1
      - key: 1_to_2_weeks
        de: 1-2 Wochen
        en: 1-2 weeks
        order: 2
      - key: 2_to_4_weeks
        de: 2-4 Wochen
        en: 2-4 weeks
        order: 3
      - key: 4_to_8_weeks
        de: 4-8 Wochen
        en: 4-8 weeks
        order: 4
      - key: over_8_weeks
        de: Über 8 Wochen oder noch nie beantragt
        en: Over 8 weeks or never requested
        order: 5
    scoring_note: Context only — does not feed into spider score directly
    order: 2
    dimension: C
  - question_key: C-M-POLICY
    question_type: maturity
    sub_topic: policy_clarity
    question_text:
      de: Welche Stufe beschreibt die AI-Policy-Situation in deinem Team am besten?
      en: Which level best describes the AI policy situation in your team?
    maturity_levels:
      "1":
        label: Exploring
        de: Ich weiss nicht, ob es AI-Regeln gibt; wenn ja, kenne ich sie nicht.
        en: I don't know if AI rules exist; if so, I don't know them.
      "2":
        label: Experimenting
        de: Es gibt Regeln, aber sie sind schwer zu finden, zu allgemein oder für meinen Alltag nicht verständlich.
        en: Rules exist, but they're hard to find, too general, or not understandable for my daily work.
      "3":
        label: Embedding
        de: Policies sind dokumentiert, bekannt und decken die wichtigsten Fälle ab; bei Spezialfällen gibt es noch Grauzonen.
        en: Policies are documented, known, and cover the key cases; there are still gray areas for special cases.
      "4":
        label: Scaling
        de: Policies sind klar, praxisnah und leicht auffindbar; Entscheidungshilfen (z.B. Ampelsystem) helfen mir im Alltag.
        en: Policies are clear, practical, and easy to find; decision aids (e.g., traffic light system) help me daily.
      "5":
        label: Evolving
        de: Policies werden regelmaessig aktualisiert, Feedback-Loops existieren, und ich kann selbst prüfen ob ein Use Case konform ist.
        en: Policies are regularly updated, feedback loops exist, and I can self-check whether a use case is compliant.
    order: 3
    dimension: C
  - question_key: C-M-SPEED
    question_type: maturity
    sub_topic: governance_speed
    question_text:
      de: Welche Stufe beschreibt die Geschwindigkeit eurer Governance-Entscheidungen am besten?
      en: Which level best describes the speed of your governance decisions?
    maturity_levels:
      "1":
        label: Exploring
        de: Es gibt keinen erkennbaren Prozess für AI-bezogene Entscheidungen oder Freigaben.
        en: There is no recognizable process for AI-related decisions or approvals.
      "2":
        label: Experimenting
        de: Es gibt einen informellen Weg, aber Wartezeiten sind unvorhersehbar und es ist unklar, wer entscheidet.
        en: There's an informal path, but wait times are unpredictable and it's unclear who decides.
      "3":
        label: Embedding
        de: Ein Freigabeprozess existiert und Ansprechpartner sind benannt, aber es dauert oft Wochen.
        en: An approval process exists and contacts are named, but it often takes weeks.
      "4":
        label: Scaling
        de: Freigaben haben ein SLA (unter 1 Woche), Eskalationswege sind klar, Fast-Track für Standard-Tools existiert.
        en: Approvals have an SLA (under 1 week), escalation paths are clear, fast-track for standard tools exists.
      "5":
        label: Evolving
        de: Self-Service-Freigabe für Standard-Tools, automatisierte Compliance-Checks; Governance ist kein Bottleneck mehr.
        en: Self-service approval for standard tools, automated compliance checks; governance is no longer a bottleneck.
    order: 4
    dimension: C
  - question_key: C-M-DATA
    question_type: maturity
    sub_topic: data_classification
    question_text:
      de: Welche Stufe beschreibt euren Umgang mit Datenklassifizierung im AI-Kontext am besten?
      en: Which level best describes how you handle data classification in the AI context?
    maturity_levels:
      "1":
        label: Exploring
        de: Ich weiss nicht, welche Daten ich in welche AI-Tools eingeben darf; es gibt keine klaren Regeln.
        en: I don't know which data I may enter into which AI tools; there are no clear rules.
      "2":
        label: Experimenting
        de: Es gibt grobe Regeln (z.B. 'keine Kundendaten'), aber viele Grauzonen; im Zweifel nutze ich AI lieber gar nicht.
        en: There are rough rules (e.g., 'no customer data'), but many gray areas; when in doubt, I'd rather not use AI.
      "3":
        label: Embedding
        de: Datenklassifizierung ist definiert und kommuniziert; für die meisten Situationen weiss ich, was erlaubt ist.
        en: Data classification is defined and communicated; for most situations, I know what's allowed.
      "4":
        label: Scaling
        de: Klares Ampelsystem oder Entscheidungsbaum; jede Sicherheitsstufe hat definierte erlaubte Datentypen; schnelle Antworten bei Grenzfällen.
        en: Clear traffic light system or decision tree; each security tier has defined allowed data types; quick answers for edge cases.
      "5":
        label: Evolving
        de: Automatisierte Checks verhindern falsche Dateneingabe; Klassifizierung ist in Tools integriert (z.B. Context-Filter, DLP).
        en: Automated checks prevent wrong data input; classification is integrated into tools (e.g., context filters, DLP).
    order: 5
    dimension: C
  - question_key: C-M-REGULATORY
    question_type: maturity
    sub_topic: regulatory_readiness
    question_text:
      de: Welche Stufe beschreibt eure Vorbereitung auf regulatorische Anforderungen (EU AI Act, Betriebsrat, etc.) am besten?
      en: Which level best describes your preparation for regulatory requirements (EU AI Act, works council, etc.)?
    maturity_levels:
      "1":
        label: Exploring
        de: Regulatorische Anforderungen an AI-Nutzung sind mir nicht bekannt oder werden nicht adressiert.
        en: Regulatory requirements for AI usage are not known to me or are not being addressed.
      "2":
        label: Experimenting
        de: Ich weiss, dass es Anforderungen gibt (z.B. EU AI Act, Betriebsrat), aber es gibt noch keinen konkreten Plan.
        en: I know requirements exist (e.g., EU AI Act, works council), but there's no concrete plan yet.
      "3":
        label: Embedding
        de: Erste Schritte sind gemacht (z.B. Gap-Analyse, Betriebsrat informiert); Umsetzung hat begonnen, ist aber lückenhaft.
        en: First steps taken (e.g., gap analysis, works council informed); implementation started but has gaps.
      "4":
        label: Scaling
        de: Roadmap steht, Betriebsvereinbarung ist vereinbart oder in Abstimmung; EU AI Act Compliance wird systematisch umgesetzt.
        en: Roadmap in place, works agreement is agreed or in alignment; EU AI Act compliance is being systematically implemented.
      "5":
        label: Evolving
        de: Alle regulatorischen Anforderungen umgesetzt und proaktiv monitored; Betriebsvereinbarung wird gelebt; neue Regulierung wird frühzeitig antizipiert.
        en: All regulatory requirements implemented and proactively monitored; works agreement is lived; new regulation is anticipated early.
    order: 6
    dimension: C
  - question_key: C-MC-BLOCKER
    question_type: diagnostic
    question_text:
      de: Was blockiert euch aktuell am stärksten im Bereich Compliance & Governance?
      en: What currently blocks you most in the area of compliance & governance?
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: unclear_data_rules
        de: Unklare Datenklassifizierung — weiss nicht, was wohin darf
        en: Unclear data classification — don't know what goes where
        order: 1
      - key: slow_approval
        de: Tool-Freigabe zu langsam oder gar nicht möglich
        en: Tool approval too slow or not possible at all
        order: 2
      - key: betriebsrat_stalled
        de: Betriebsrat-Abstimmung fehlt oder stockt
        en: Works council alignment missing or stalled
        order: 3
      - key: no_policy
        de: Keine oder unklare AI-Nutzungs-Policy
        en: No or unclear AI usage policy
        order: 4
      - key: cost_quota
        de: Kosten- oder Quota-Einschränkungen
        en: Cost or quota restrictions
        order: 5
      - key: nothing
        de: Nichts blockiert aktuell
        en: Nothing currently blocking
        order: 6
      - key: other
        de: Anderes
        en: Other
        order: 7
    order: 7
    dimension: C
  - question_key: C-MC-INTERVENTION
    question_type: diagnostic
    question_text:
      de: Welche Massnahme würde euch im Bereich Compliance & Governance am meisten helfen?
      en: Which measure would help you most in compliance & governance?
    answer_type: multiple_choice
    allow_multiple: true
    max_selections: 3
    answer_options:
      - key: practical_policy
        de: Praxisnahe Policy mit konkreten Beispielen und Entscheidungshilfen
        en: Practical policy with concrete examples and decision aids
        order: 1
      - key: faster_approval
        de: Schnellerer Freigabeprozess / Fast-Track für Standard-Tools
        en: Faster approval process / fast-track for standard tools
        order: 2
      - key: clear_data_rules
        de: "Klare Datenklassifizierung (Ampelsystem: was darf wohin?)"
        en: "Clear data classification (traffic light system: what goes where?)"
        order: 3
      - key: betriebsvereinbarung
        de: Betriebsvereinbarung für AI-Tools abschliessen
        en: Conclude works agreement for AI tools
        order: 4
      - key: self_service_checks
        de: Self-Service Compliance-Checks (kann ich das nutzen? Ja/Nein)
        en: Self-service compliance checks (can I use this? Yes/No)
        order: 5
      - key: better_communication
        de: Bessere Kommunikation bestehender Regeln und Ansprechpartner
        en: Better communication of existing rules and contacts
        order: 6
      - key: other
        de: Anderes
        en: Other
        order: 7
    order: 8
    dimension: C
  - question_key: C-PQ
    question_type: powerful_question
    optional: true
    question_text:
      de: Welche Governance-Regel würde sich morgen ändern, wenn du entscheiden duerftest?
      en: Which governance rule would change tomorrow if you could decide?
    max_length: 280
    moderation_note:
      de: Nur als Themen-Cluster veröffentlichen, nie als Rohtext. k-Anonymität beachten.
      en: Only publish as topic clusters, never as raw text. Observe k-anonymity.
    order: 9
    dimension: C
  - question_key: R-CTX-1
    question_type: context
    sub_topic: null
    question_text:
      de: Gibt es ein formales AI-Enablement-Programm (Training, Workshops, Lernpfade)?
      en: Is there a formal AI enablement program (training, workshops, learning paths)?
    why_important:
      de: "Faktische Grundlage: Enablement-Infrastruktur bestimmt ob Skill-Aufbau systematisch oder ad-hoc stattfindet."
      en: "Factual basis: Enablement infrastructure determines whether skill building is systematic or ad-hoc."
    answer_type: single_choice
    answer_options:
      - key: comprehensive
        de: Ja, umfassendes Programm mit verschiedenen Formaten
        en: Yes, comprehensive program with various formats
        order: 1
      - key: basic
        de: Ja, aber nur einzelne Trainings oder Workshops
        en: Yes, but only individual trainings or workshops
        order: 2
      - key: informal
        de: Informell — ad-hoc, keine strukturierten Angebote
        en: Informal — ad-hoc, no structured offerings
        order: 3
      - key: none
        de: Nein, kein Enablement vorhanden
        en: No, no enablement available
        order: 4
    scoring_note: Context only — does not feed into spider score directly
    order: 10
    dimension: R
  - question_key: R-CTX-2
    question_type: context
    sub_topic: null
    question_text:
      de: Nutzt du aktuell nicht-freigegebene AI-Tools (Shadow AI) für Arbeitszwecke?
      en: Do you currently use non-approved AI tools (Shadow AI) for work purposes?
    why_important:
      de: Shadow AI zeigt unerfüllten Bedarf. Hohe Shadow-AI-Rate = Teams wollen AI nutzen, offizielle Wege sind blockiert.
      en: Shadow AI shows unmet need. High shadow AI rate = teams want AI, official paths are blocked.
    description:
      de: Anonym — nur Trend wird ausgewertet, keine individuelle Zuordnung
      en: Anonymous — only trend is evaluated, no individual attribution
    answer_type: single_choice
    answer_options:
      - key: never
        de: Nie
        en: Never
        order: 1
      - key: rarely
        de: Selten
        en: Rarely
        order: 2
      - key: occasionally
        de: Gelegentlich
        en: Occasionally
        order: 3
      - key: frequently
        de: Häufig
        en: Frequently
        order: 4
    scoring_note: Context only — trend indicator for unmet demand
    order: 11
    dimension: R
  - question_key: R-M-SAFETY
    question_type: maturity
    sub_topic: psychological_safety
    question_text:
      de: Welche Stufe beschreibt die psychologische Sicherheit für AI-Experimente in deinem Team am besten?
      en: Which level best describes the psychological safety for AI experiments in your team?
    maturity_levels:
      "1":
        label: Exploring
        de: Mit AI zu experimentieren wird skeptisch gesehen oder nicht thematisiert; ich fühle mich nicht sicher, neue Tools auszuprobieren.
        en: Experimenting with AI is viewed skeptically or not discussed; I don't feel safe trying new tools.
      "2":
        label: Experimenting
        de: Es wird toleriert, aber nicht aktiv ermutigt; wenn etwas schiefgeht, würde ich es lieber nicht erwähnen.
        en: It's tolerated but not actively encouraged; if something goes wrong, I'd rather not mention it.
      "3":
        label: Embedding
        de: Experimentieren ist ok und wir sprechen offen über AI; aber es hängt vom Manager oder Projekt ab.
        en: Experimenting is ok and we discuss AI openly; but it depends on the manager or project.
      "4":
        label: Scaling
        de: Aktive Ermutigung zu experimentieren; Fehler werden als Lernen gesehen; regelmaessige Sharing-Sessions existieren.
        en: Active encouragement to experiment; failures seen as learning; regular sharing sessions exist.
      "5":
        label: Evolving
        de: Experimentieren ist systematisch verankert; Leadership experimentiert sichtbar mit; Learnings aus AI-Experimenten sind Teil unserer Retros.
        en: Experimentation is systematically anchored; leadership visibly experiments; learnings from AI experiments are part of our retros.
    order: 12
    dimension: R
  - question_key: R-M-SKILL
    question_type: maturity
    sub_topic: skill_confidence
    question_text:
      de: Welche Stufe beschreibt dein persönliches AI-Skill-Level und Vertrauen am besten?
      en: Which level best describes your personal AI skill level and confidence?
    maturity_levels:
      "1":
        label: Exploring
        de: Ich weiss nicht, was AI für meine Arbeit tun kann; es gibt keine Trainingsangebote.
        en: I don't know what AI can do for my work; there are no training offerings.
      "2":
        label: Experimenting
        de: Ich habe eine grobe Vorstellung, fühle mich aber unsicher; ich weiss nicht, wo ich anfangen soll oder was ein guter Prompt ist.
        en: I have a rough idea but feel insecure; I don't know where to start or what makes a good prompt.
      "3":
        label: Embedding
        de: Ich kann AI-Tools für grundlegende Aufgaben nutzen; ich verstehe Grenzen (Halluzinationen), brauche aber mehr Praxis.
        en: I can use AI tools for basic tasks; I understand limitations (hallucinations) but need more practice.
      "4":
        label: Scaling
        de: Ich kann AI-Outputs kritisch bewerten; ich weiss, welches Tool für welche Aufgabe; ich helfe anderen beim Einstieg.
        en: I can critically evaluate AI outputs; I know which tool for which task; I help others get started.
      "5":
        label: Evolving
        de: Ich bin sicher im Umgang mit AI; ich optimiere Prompts/Workflows aktiv, teile Best Practices und gestalte neue Arbeitsweisen.
        en: I'm confident with AI; I actively optimize prompts/workflows, share best practices, and shape new ways of working.
    order: 13
    dimension: R
  - question_key: R-M-ROLE
    question_type: maturity
    sub_topic: role_evolution
    question_text:
      de: Welche Stufe beschreibt dein Verständnis darüber, wie sich deine Rolle durch AI verändert, am besten?
      en: Which level best describes your understanding of how your role changes with AI?
    maturity_levels:
      "1":
        label: Exploring
