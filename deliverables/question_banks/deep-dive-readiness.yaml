# =============================================================================
# CRAFT Deep-Dive: Readiness — Human & Cultural (Dimension R)
# =============================================================================
# Extended exploration for the R dimension. Same quality criteria as Pulse Check.
# See METHODOLOGY.md for design principles and scoring rules.
# Framework Reference: [AI Transformation Framework — Kap. 3.2 Readiness (Human & Cultural)](../../framework/ai-transformation-framework-craft.md)
#
# Version: 2.0
# Last Updated: 2026-02-12
# Total Questions: 10 (2 Context + 4 Maturity + 2 MC-Diagnostik + 2 Powerful Questions)
# Estimated Duration: 15-20 minutes
# =============================================================================

version: "2.0"
exploration_type: "deep_dive_readiness"
dimension: "R"
dimension_name:
  de: "Readiness (Human & Cultural)"
  en: "Readiness (Human & Cultural)"

description:
  de: >-
    Vertiefende Analyse der menschlichen und kulturellen AI-Readiness.
    Bricht die Dimension R in 4 Sub-Topics auf: Psychologische Sicherheit,
    Skill-Vertrauen, Rollenentwicklung und Peer-Support/Champions.
  en: >-
    In-depth analysis of human and cultural AI readiness.
    Breaks dimension R into 4 sub-topics: psychological safety,
    skill confidence, role evolution, and peer support/champions.

estimated_duration_minutes: 20
frequency: "once_at_kickoff_then_on_demand"
trigger:
  condition: "Kickoff baseline OR R-Score drop/stagnation in Pulse Check"
respondent: "All team members (individual, anonymous)"

# =============================================================================
# SUB-TOPICS
# =============================================================================
sub_topics:
  - key: "psychological_safety"
    name:
      de: "Psychologische Sicherheit"
      en: "Psychological Safety"
    description:
      de: "Können Menschen mit AI experimentieren, ohne Angst vor Bewertung oder Bestrafung?"
      en: "Can people experiment with AI without fear of judgment or punishment?"
    order: 1

  - key: "skill_confidence"
    name:
      de: "Skill-Level & Vertrauen"
      en: "Skill Level & Confidence"
    description:
      de: "Fühlen sich Menschen sicher genug, AI-Tools effektiv zu nutzen?"
      en: "Do people feel confident enough to use AI tools effectively?"
    order: 2

  - key: "role_evolution"
    name:
      de: "Rollenentwicklung & Klarheit"
      en: "Role Evolution & Clarity"
    description:
      de: "Verstehen Menschen, wie sich ihre Rolle mit AI verändert?"
      en: "Do people understand how their role evolves with AI?"
    order: 3

  - key: "peer_support"
    name:
      de: "Peer-Support & Champions"
      en: "Peer Support & Champions"
    description:
      de: "Gibt es ein Unterstützungsnetzwerk (Champions, Pairing, Community)?"
      en: "Is there a support network (champions, pairing, community)?"
    order: 4

# =============================================================================
# QUESTIONS
# =============================================================================
questions:

  # ---------------------------------------------------------------------------
  # CONTEXT / METRIC QUESTIONS
  # ---------------------------------------------------------------------------
  - question_key: "R-CTX-1"
    question_type: "context"
    sub_topic: ~
    question_text:
      de: "Gibt es ein formales AI-Enablement-Programm (Training, Workshops, Lernpfade)?"
      en: "Is there a formal AI enablement program (training, workshops, learning paths)?"
    why_important:
      de: "Faktische Grundlage: Enablement-Infrastruktur bestimmt ob Skill-Aufbau systematisch oder ad-hoc stattfindet."
      en: "Factual basis: Enablement infrastructure determines whether skill building is systematic or ad-hoc."
    answer_type: "single_choice"
    answer_options:
      - key: "comprehensive"
        de: "Ja, umfassendes Programm mit verschiedenen Formaten"
        en: "Yes, comprehensive program with various formats"
        order: 1
      - key: "basic"
        de: "Ja, aber nur einzelne Trainings oder Workshops"
        en: "Yes, but only individual trainings or workshops"
        order: 2
      - key: "informal"
        de: "Informell — ad-hoc, keine strukturierten Angebote"
        en: "Informal — ad-hoc, no structured offerings"
        order: 3
      - key: "none"
        de: "Nein, kein Enablement vorhanden"
        en: "No, no enablement available"
        order: 4
    scoring_note: "Context only — does not feed into spider score directly"
    order: 1

  - question_key: "R-CTX-2"
    question_type: "context"
    sub_topic: ~
    challenge_ref: ["A-H4", "R-H3"]
    question_text:
      de: "Nutzt du aktuell nicht-freigegebene AI-Tools (Shadow AI) für Arbeitszwecke?"
      en: "Do you currently use non-approved AI tools (Shadow AI) for work purposes?"
    normalization_note:
      de: "In vielen Teams nutzen Mitarbeitende private AI-Tools, um produktiver zu sein — das ist ein häufiges und verständliches Verhalten. Deine ehrliche Antwort hilft uns, bessere offizielle Lösungen zu schaffen."
      en: "In many teams, people use private AI tools to be more productive — this is a common and understandable behavior. Your honest answer helps us create better official solutions."
    why_important:
      de: "Shadow AI zeigt unerfüllten Bedarf. Hohe Shadow-AI-Rate = Teams wollen AI nutzen, offizielle Wege sind blockiert."
      en: "Shadow AI shows unmet need. High shadow AI rate = teams want AI, official paths are blocked."
    description:
      de: "Anonym — nur Trend wird ausgewertet, keine individuelle Zuordnung"
      en: "Anonymous — only trend is evaluated, no individual attribution"
    answer_type: "single_choice"
    answer_options:
      - key: "never"
        de: "Nie"
        en: "Never"
        order: 1
      - key: "rarely"
        de: "Selten"
        en: "Rarely"
        order: 2
      - key: "occasionally"
        de: "Gelegentlich"
        en: "Occasionally"
        order: 3
      - key: "frequently"
        de: "Häufig"
        en: "Frequently"
        order: 4
      - key: "regularly"
        de: "Regelmäßig / Täglich"
        en: "Regularly / Daily"
        order: 5
    scoring_note: "Context only — trend indicator for unmet demand"
    order: 2

  # ---------------------------------------------------------------------------
  # MATURITY QUESTIONS
  # ---------------------------------------------------------------------------
  - question_key: "R-M-SAFETY"
    question_type: "maturity"
    sub_topic: "psychological_safety"
    question_text:
      de: "Welche Stufe beschreibt die psychologische Sicherheit für AI-Experimente in deinem Team am besten?"
      en: "Which level best describes the psychological safety for AI experiments in your team?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Mit AI zu experimentieren wird skeptisch gesehen oder nicht thematisiert; ich fühle mich nicht sicher, neue Tools auszuprobieren."
        en: "Experimenting with AI is viewed skeptically or not discussed; I don't feel safe trying new tools."
      2:
        label: "Experimenting"
        de: "Es wird toleriert, aber nicht aktiv ermutigt; wenn etwas schiefgeht, würde ich es lieber nicht erwähnen."
        en: "It's tolerated but not actively encouraged; if something goes wrong, I'd rather not mention it."
      3:
        label: "Embedding"
        de: "Experimentieren ist ok und wir sprechen offen über AI; aber es hängt vom Manager oder Projekt ab."
        en: "Experimenting is ok and we discuss AI openly; but it depends on the manager or project."
      4:
        label: "Scaling"
        de: "Aktive Ermutigung zu experimentieren; Fehler werden als Lernen gesehen; regelmaessige Sharing-Sessions existieren."
        en: "Active encouragement to experiment; failures seen as learning; regular sharing sessions exist."
      5:
        label: "Evolving"
        de: "Experimentieren ist systematisch verankert; Leadership experimentiert sichtbar mit; Learnings aus AI-Experimenten sind Teil unserer Retros."
        en: "Experimentation is systematically anchored; leadership visibly experiments; learnings from AI experiments are part of our retros."
    order: 3

  - question_key: "R-M-SKILL"
    question_type: "maturity"
    sub_topic: "skill_confidence"
    question_text:
      de: "Welche Stufe beschreibt dein persönliches AI-Skill-Level und Vertrauen am besten?"
      en: "Which level best describes your personal AI skill level and confidence?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich weiss nicht, was AI für meine Arbeit tun kann; es gibt keine Trainingsangebote."
        en: "I don't know what AI can do for my work; there are no training offerings."
      2:
        label: "Experimenting"
        de: "Ich habe eine grobe Vorstellung, fühle mich aber unsicher; ich weiss nicht, wo ich anfangen soll oder was ein guter Prompt ist."
        en: "I have a rough idea but feel insecure; I don't know where to start or what makes a good prompt."
      3:
        label: "Embedding"
        de: "Ich kann AI-Tools für grundlegende Aufgaben nutzen; ich verstehe Grenzen (Halluzinationen), brauche aber mehr Praxis."
        en: "I can use AI tools for basic tasks; I understand limitations (hallucinations) but need more practice."
      4:
        label: "Scaling"
        de: "Ich kann AI-Outputs kritisch bewerten; ich weiss, welches Tool für welche Aufgabe; ich helfe anderen beim Einstieg."
        en: "I can critically evaluate AI outputs; I know which tool for which task; I help others get started."
      5:
        label: "Evolving"
        de: "Ich bin sicher im Umgang mit AI; ich optimiere Prompts/Workflows aktiv, teile Best Practices und gestalte neue Arbeitsweisen."
        en: "I'm confident with AI; I actively optimize prompts/workflows, share best practices, and shape new ways of working."
    order: 4

  - question_key: "R-M-ROLE"
    question_type: "maturity"
    sub_topic: "role_evolution"
    question_text:
      de: "Welche Stufe beschreibt dein Verständnis darüber, wie sich deine Rolle durch AI verändert, am besten?"
      en: "Which level best describes your understanding of how your role changes with AI?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Ich habe keine Vorstellung davon, wie AI meine Rolle verändert; niemand spricht darüber."
        en: "I have no idea how AI changes my role; nobody talks about it."
      2:
        label: "Experimenting"
        de: "Ich habe gehört, dass sich Rollen ändern, aber es ist unklar, was das für MICH konkret bedeutet."
        en: "I've heard roles are changing, but it's unclear what that means for ME specifically."
      3:
        label: "Embedding"
        de: "Ich verstehe grob, wie sich meine Rolle entwickelt; es gibt Diskussionen, aber keinen konkreten Entwicklungsplan."
        en: "I roughly understand how my role evolves; there are discussions but no concrete development plan."
      4:
        label: "Scaling"
        de: "Es gibt ein klares Rollenentwicklungs-Narrativ; ich weiss welche neuen Skills ich brauche; Lernpfade sind verfügbar."
        en: "There's a clear role evolution narrative; I know which new skills I need; learning paths are available."
      5:
        label: "Evolving"
        de: "Meine Rolle hat sich aktiv weiterentwickelt; ich arbeite auf höherem Niveau (mehr Design, weniger Routine); ich gestalte Rollenmodelle für andere mit."
        en: "My role has actively evolved; I work at a higher level (more design, less routine); I help shape role models for others."
    order: 5

  - question_key: "R-M-SUPPORT"
    question_type: "maturity"
    sub_topic: "peer_support"
    question_text:
      de: "Welche Stufe beschreibt das AI-Unterstützungsnetzwerk in eurem Team am besten?"
      en: "Which level best describes the AI support network in your team?"
    maturity_levels:
      1:
        label: "Exploring"
        de: "Es gibt niemanden, den ich zu AI fragen kann; ich bin auf mich allein gestellt."
        en: "There's no one I can ask about AI; I'm on my own."
      2:
        label: "Experimenting"
        de: "Ich kenne informell jemanden der helfen kann, aber es gibt keine strukturierte Unterstützung."
        en: "I informally know someone who can help, but there's no structured support."
      3:
        label: "Embedding"
        de: "Es gibt benannte AI-Ansprechpartner/Champions, aber sie haben keine dedizierte Zeit dafür."
        en: "There are designated AI contacts/champions, but they don't have dedicated time for it."
      4:
        label: "Scaling"
        de: "Aktives Champion-Netzwerk mit dedizierter Zeit (mind. 20%); regelmaessige Office Hours und Pairing-Sessions."
        en: "Active champion network with dedicated time (min. 20%); regular office hours and pairing sessions."
      5:
        label: "Evolving"
        de: "Champions sind etablierte Multiplikatoren; Peer Learning ist systematisch; neue Teammitglieder bekommen AI-Onboarding als Standard."
        en: "Champions are established multipliers; peer learning is systematic; new team members get AI onboarding as standard."
    order: 6

  # ---------------------------------------------------------------------------
  # MC DIAGNOSTICS
  # ---------------------------------------------------------------------------
  - question_key: "R-MC-BLOCKER"
    question_type: "diagnostic"
    challenge_ref: ["R-H1", "R-H2", "R-H4", "R-H5", "R-H6"]
    normalization_note:
      de: "Viele Menschen erleben Hemmnisse bei der AI-Nutzung — das ist ein normaler Teil der Transformation. Deine ehrliche Antwort hilft uns, gezielt die richtigen Unterstützungsangebote zu schaffen."
      en: "Many people experience barriers in AI usage — this is a normal part of transformation. Your honest answer helps us create the right support offerings."
    question_text:
      de: "Was hemmt dich aktuell am meisten bei der AI-Nutzung?"
      en: "What currently inhibits you most in using AI?"
    answer_type: "single_choice"
    answer_options:
      - key: "role_concern"
        de: "Sorge um meine Rolle / meinen Arbeitsplatz"
        en: "Concern about my role / my job"
        order: 1
      - key: "missing_skills"
        de: "Fehlende Skills — weiss nicht wie ich AI effektiv nutze"
        en: "Missing skills — don't know how to use AI effectively"
        order: 2
      - key: "no_time"
        de: "Keine Zeit zum Lernen oder Experimentieren"
        en: "No time to learn or experiment"
        order: 3
      - key: "unclear_value"
        de: "Unklar, wofür AI in meiner Arbeit sinnvoll ist"
        en: "Unclear what AI is useful for in my work"
        order: 4
      - key: "quality_distrust"
        de: "Misstrauen gegenüber AI-Output-Qualität"
        en: "Distrust of AI output quality"
        order: 5
      - key: "tech_barriers"
        de: "Technische Hürden (Zugang, Tools, Performance)"
        en: "Technical barriers (access, tools, performance)"
        order: 6
      - key: "nothing"
        de: "Nichts hemmt mich"
        en: "Nothing inhibits me"
        order: 7
    order: 7

  - question_key: "R-MC-ENABLEMENT"
    question_type: "diagnostic"
    question_text:
      de: "Was wäre für dich der stärkste Enablement-Hebel?"
      en: "What would be the strongest enablement lever for you?"
    answer_type: "single_choice"
    answer_options:
      - key: "playbooks"
        de: "Kurze Beispiele / Playbooks für meinen Arbeitsalltag"
        en: "Short examples / playbooks for my daily work"
        order: 1
      - key: "pairing"
        de: "Pairing mit erfahrenen Kolleg:innen"
        en: "Pairing with experienced colleagues"
        order: 2
      - key: "training"
        de: "Strukturiertes Training (Workshops, Kurse)"
        en: "Structured training (workshops, courses)"
        order: 3
      - key: "prompts"
        de: "Bessere Prompts / Templates für meine Use Cases"
        en: "Better prompts / templates for my use cases"
        order: 4
      - key: "time"
        de: "Mehr dedizierte Zeit zum Experimentieren"
        en: "More dedicated time to experiment"
        order: 5
      - key: "champion"
        de: "Champion-Support / Ansprechpartner im Team"
        en: "Champion support / contact person in team"
        order: 6
    order: 8

  # ---------------------------------------------------------------------------
  # POWERFUL QUESTIONS
  # ---------------------------------------------------------------------------
  - question_key: "R-PQ"
    question_type: "powerful_question"
    optional: true
    question_text:
      de: "Was müsste passieren, damit du dich sicher fühlst, AI aktiv in deinem Arbeitsalltag zu nutzen?"
      en: "What would need to happen for you to feel confident actively using AI in your daily work?"
    max_length: 280
    moderation_note:
      de: "Nur als Themen-Cluster veröffentlichen, nie als Rohtext. k-Anonymität beachten."
      en: "Only publish as topic clusters, never as raw text. Observe k-anonymity."
    order: 9

# =============================================================================
# SCORING
# =============================================================================
scoring:
  formula: "(median(R-M-SAFETY, R-M-SKILL, R-M-ROLE, R-M-SUPPORT) * 0.6) + (min(R-M-SAFETY, R-M-SKILL, R-M-ROLE, R-M-SUPPORT) * 0.4)"
  scale: "1-5"
  interpretation:
    1:
      label: "Exploring"
      de: "Hohe Unsicherheit und Angst; keine Enablement-Angebote; keine Unterstützungsstrukturen."
      en: "High uncertainty and fear; no enablement offerings; no support structures."
    2:
      label: "Experimenting"
      de: "Bewusstsein da, aber Skills fehlen; Experimentieren wird toleriert, nicht gefördert."
      en: "Awareness present but skills missing; experimentation tolerated, not promoted."
    3:
      label: "Embedding"
      de: "Grundlegende Skills vorhanden; Experimentieren ist ok; Champions entstehen, aber ohne dedizierte Zeit."
      en: "Basic skills present; experimentation ok; champions emerging but without dedicated time."
    4:
      label: "Scaling"
      de: "Sicherer Umgang mit AI; aktives Champion-Netzwerk; klare Rollenentwicklung; Management fördert aktiv."
      en: "Confident AI usage; active champion network; clear role evolution; management actively promotes."
    5:
      label: "Evolving"
      de: "AI ist Teil der Identität; systematisches Peer Learning; Rollen haben sich weiterentwickelt; kontinuierliche Verbesserung."
      en: "AI is part of identity; systematic peer learning; roles have evolved; continuous improvement."

pulse_check_relationship:
  pulse_check_question: "R-M1"
  sub_topic_mapping:
    R-M1_level_1: "Maps to: skill_confidence at Exploring, no enablement"
    R-M1_level_2: "Maps to: skill_confidence at Experimenting, psychological_safety low"
    R-M1_level_3: "Maps to: skill_confidence at Embedding, safety ok but role unclear"
    R-M1_level_4: "Maps to: most sub-topics at Scaling, active role evolution"
    R-M1_level_5: "Maps to: all sub-topics at Evolving, champion role, proactive"
