<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Navigator — CRAFT Exploration</title>
  </head>
  <body>
    <script>
      // Apply dark mode before first paint to prevent flash
      if (localStorage.getItem('ai-navigator:theme') === 'dark' ||
          (!localStorage.getItem('ai-navigator:theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
