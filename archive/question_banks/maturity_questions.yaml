# Maturity Assessment Question Bank
# ==================================
# Diagnose current AI maturity with adaptive question selection across 4 dimensions × 5 levels
#
# Version: 2.0
# Last Updated: 2025-12-22
# Total Questions: 45 (selected from 100+ question pool)
# Adaptive Filtering: Shows 20-30 most relevant based on pre-readiness + context

version: "2.0"
assessment_type: "maturity"
description: "AI Maturity Assessment über 4 Dimensionen (Individual, Team, Organizational, Strategic)"

categories:
  - key: "individual"
    name:
      de: "Individual Proficiency"
      en: "Individual Proficiency"
    description:
      de: "Individuelle KI-Nutzung und Fähigkeiten"
      en: "Individual AI usage and skills"
    
  - key: "team"
    name:
      de: "Team Workflows"
      en: "Team Workflows"
    description:
      de: "Team-weite KI-Integration in Workflows"
      en: "Team-wide AI integration in workflows"
    
  - key: "organizational"
    name:
      de: "Program/Organizational"
      en: "Program/Organizational"
    description:
      de: "Organisationsweite KI-Governance und Programme"
      en: "Organization-wide AI governance and programs"
    
  - key: "strategic"
    name:
      de: "Strategic Innovation"
      en: "Strategic Innovation"
    description:
      de: "Strategische KI-Differenzierung und Innovation"
      en: "Strategic AI differentiation and innovation"

questions:
  # ========== LEVEL 1: INDIVIDUAL PROFICIENCY ==========
  
  - question_key: "daily_ai_usage"
    is_default: true
    category: "individual"
    maturity_level: "L1"
    question_text:
      de: "Wie häufig nutzen Sie KI-Coding-Assistenten im Alltag (Copilot, ChatGPT, Claude)?"
      en: "How frequently do you use AI coding assistants daily (Copilot, ChatGPT, Claude)?"
    description:
      de: "Grundlage für individuelle KI-Adoption"
      en: "Baseline for individual AI adoption"
    why_important:
      de: "Tägliche Nutzung ist Fundament für weitere Maturity"
      en: "Daily usage is foundation for further maturity"
    answer_type: "single_choice"
    answer_options:
      - key: "always"
        de: "Immer, unverzichtbar"
        en: "Always, indispensable"
        score: 100
        order: 1
      - key: "frequent"
        de: "Mehrmals täglich"
        en: "Multiple times daily"
        score: 80
        order: 2
      - key: "occasional"
        de: "Gelegentlich"
        en: "Occasionally"
        score: 40
        order: 3
      - key: "rare"
        de: "Selten/Nie"
        en: "Rarely/Never"
        score: 0
        order: 4
    order: 1
    weight: 1.5

  - question_key: "task_coverage"
    is_default: true
    category: "individual"
    maturity_level: "L1"
    question_text:
      de: "Für welchen Anteil Ihrer Aufgaben nutzen Sie KI?"
      en: "For what percentage of your tasks do you use AI?"
    answer_type: "single_choice"
    answer_options:
      - key: "high"
        de: ">75%"
        en: ">75%"
        score: 100
        order: 1
      - key: "medium_high"
        de: "50-75%"
        en: "50-75%"
        score: 80
        order: 2
      - key: "medium_low"
        de: "25-50%"
        en: "25-50%"
        score: 50
        order: 3
      - key: "low"
        de: "<25%"
        en: "<25%"
        score: 20
        order: 4
    order: 2
    weight: 1.2

  - question_key: "effectiveness_perception"
    is_default: true
    category: "individual"
    maturity_level: "L1"
    question_text:
      de: "Wie effektiv ist KI für Ihre Arbeit?"
      en: "How effective is AI for your work?"
    answer_type: "single_choice"
    answer_options:
      - key: "game_changer"
        de: "Game-Changer, 2-3x produktiver"
        en: "Game-changer, 2-3x more productive"
        score: 100
        order: 1
      - key: "significant"
        de: "Signifikant, +50%"
        en: "Significant, +50%"
        score: 80
        order: 2
      - key: "moderate"
        de: "Moderat hilfreich"
        en: "Moderately helpful"
        score: 50
        order: 3
      - key: "limited"
        de: "Limitiert/Neutral"
        en: "Limited/Neutral"
        score: 10
        order: 4
    order: 3
    weight: 1.0

  - question_key: "skill_development"
    is_default: true
    category: "individual"
    maturity_level: "L1"
    question_text:
      de: "Haben Sie aktiv Prompt-Engineering und KI-Best-Practices gelernt?"
      en: "Have you actively learned prompt engineering and AI best practices?"
    answer_type: "single_choice"
    answer_options:
      - key: "expert"
        de: "Ja, fortgeschritten (Kurs + selbstgesteuert)"
        en: "Yes, advanced (course + self-directed)"
        score: 100
        order: 1
      - key: "intermediate"
        de: "Ja, grundlegend"
        en: "Yes, basic"
        score: 70
        order: 2
      - key: "trial_error"
        de: "Nur Trial & Error"
        en: "Only trial & error"
        score: 30
        order: 3
      - key: "none"
        de: "Kein Training"
        en: "No training"
        score: 0
        order: 4
    order: 4
    weight: 1.0

  - question_key: "prompt_engineering"
    is_default: true
    category: "individual"
    maturity_level: "L1"
    question_text:
      de: "Nutzen Sie fortgeschrittene Prompt-Techniken (few-shot, chain-of-thought, role prompting)?"
      en: "Do you use advanced prompt techniques (few-shot, chain-of-thought, role prompting)?"
    answer_type: "single_choice"
    answer_options:
      - key: "advanced"
        de: "Ja, regelmäßig"
        en: "Yes, regularly"
        score: 100
        order: 1
      - key: "basic"
        de: "Ja, gelegentlich"
        en: "Yes, occasionally"
        score: 60
        order: 2
      - key: "none"
        de: "Nur einfache Prompts"
        en: "Only simple prompts"
        score: 20
        order: 3
    order: 5
    weight: 0.8

